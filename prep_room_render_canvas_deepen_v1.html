<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>师维 · 备课室 | 渲染画布深化 V1</title>
  <style>
    :root {
      --bg: #f5f7f7;
      --panel: #ffffff;
      --panel-soft: #f8fbfa;
      --ink: #1d2723;
      --muted: #66736e;
      --line: #d8e0dc;
      --line-strong: #becbc5;
      --green: #2f7668;
      --green-soft: #e5f2ee;
      --blue: #315f90;
      --blue-soft: #e8f0f8;
      --amber: #ac6a1c;
      --amber-soft: #f7eee2;
      --red: #b34d43;
      --red-soft: #f7e9e7;
      --shadow: 0 18px 48px rgba(29, 39, 35, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(180deg, #ffffff 0, var(--bg) 72px, var(--bg) 100%);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
    }

    .topbar {
      min-height: 72px;
      display: grid;
      grid-template-columns: minmax(190px, 0.9fr) minmax(360px, 1.4fr) minmax(260px, 0.9fr);
      align-items: center;
      gap: 18px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
    }

    .logo-area {
      display: flex;
      align-items: baseline;
      gap: 7px;
      min-width: 0;
    }

    .logo-mark {
      font-size: 25px;
      color: var(--green);
      font-weight: 900;
      line-height: 1;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 850;
      line-height: 1;
      color: #244c42;
      white-space: nowrap;
    }

    .logo-sub {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .space-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .space-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 18px;
      text-decoration: none;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    .space-btn:hover {
      transform: translateY(-1px);
      background: var(--green-soft);
      border-color: #b9d9cf;
    }

    .space-btn.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
      box-shadow: 0 8px 18px rgba(47, 118, 104, 0.16);
    }

    .nav-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
    }

    .search-box {
      min-width: 0;
      max-width: 230px;
      height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
    }

    .search-box input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
    }

    .nav-icon,
    .user-avatar {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--green);
      position: relative;
    }

    .nav-badge {
      position: absolute;
      top: -3px;
      right: -4px;
      min-width: 16px;
      height: 16px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #d46a4c;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
    }

    .context-bar {
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfdfb;
    }

    .context-title {
      min-width: 0;
      font-size: 18px;
      font-weight: 850;
      color: #244c42;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .context-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .context-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid #cfe0d9;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      max-width: 100%;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill.strong {
      color: var(--green);
      border-color: #b9d9cf;
      background: var(--green-soft);
      font-weight: 700;
    }

    .workspace {
      height: calc(100vh - 72px - 54px - 78px - 42px);
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr) 64px;
      gap: 0;
      overflow: hidden;
    }

    .intent-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: #fbfdfc;
      overflow: hidden;
    }

    .panel-scroll {
      min-height: 0;
      overflow: auto;
      padding: 16px;
    }

    .assistant-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .assistant-avatar {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .assistant-name {
      font-weight: 800;
    }

    .assistant-role {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
      line-height: 1.5;
    }

    .section {
      margin-top: 14px;
      padding: 14px 0 0;
      border-top: 1px solid var(--line);
    }

    .section:first-of-type {
      border-top: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      font-weight: 800;
      font-size: 13px;
    }

    .section-caption {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .intent-input {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      padding: 10px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      outline: none;
      line-height: 1.7;
    }

    .intent-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 118, 104, 0.12);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .intent-chip,
    .text-button,
    .primary-button,
    .ghost-button {
      min-height: 32px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
    }

    .intent-chip {
      color: var(--muted);
      font-size: 12px;
    }

    .intent-chip:hover,
    .text-button:hover,
    .ghost-button:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-soft);
    }

    .primary-button {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
      font-weight: 700;
    }

    .primary-button:hover {
      background: #255f54;
    }

    .ghost-button {
      color: var(--green);
      border-color: #b9d9cf;
      background: var(--green-soft);
      font-weight: 700;
    }

    .result-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .result-list li {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      line-height: 1.65;
    }

    .agent-note {
      padding: 12px;
      border-left: 3px solid var(--green);
      background: var(--green-soft);
      border-radius: 0 var(--radius) var(--radius) 0;
      line-height: 1.7;
      color: #24453e;
    }

    .prep-render-canvas {
      position: relative;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(216, 224, 220, 0.45) 1px, transparent 1px),
        linear-gradient(0deg, rgba(216, 224, 220, 0.45) 1px, transparent 1px),
        #f9fbfa;
      background-size: 28px 28px;
    }

    .canvas-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
    }

    .canvas-kicker {
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .canvas-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .canvas-summary {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
      max-width: 880px;
    }

    .view-tabs {
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(88px, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .view-tab {
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      padding: 0 10px;
      white-space: nowrap;
    }

    .view-tab.active {
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .canvas-stage {
      position: relative;
      min-height: 0;
      flex: 1;
      overflow: auto;
      padding: 18px;
    }

    .render-layer {
      min-width: 780px;
      min-height: 100%;
      position: relative;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .render-layer.is-fading {
      opacity: 0;
      transform: translateY(8px);
    }

    .render-layer.is-entering {
      opacity: 0;
      transform: translateY(8px);
    }

    .canvas-band {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 34px rgba(29, 39, 35, 0.08);
    }

    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .metric {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .metric-value {
      font-size: 21px;
      font-weight: 850;
      color: var(--ink);
    }

    .metric-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .week-board {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .canvas-node {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      transition: border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
      outline: none;
    }

    .canvas-node:hover,
    .canvas-node:focus {
      border-color: var(--green);
      box-shadow: 0 12px 24px rgba(47, 118, 104, 0.12);
      transform: translateY(-1px);
    }

    .canvas-node.selected {
      border-color: var(--green);
      box-shadow: inset 0 0 0 2px rgba(47, 118, 104, 0.2), 0 14px 30px rgba(47, 118, 104, 0.14);
    }

    .week-card {
      min-height: 230px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .node-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .node-eyebrow {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .node-title {
      margin-top: 4px;
      font-weight: 850;
      line-height: 1.35;
    }

    .state-tag,
    .risk-tag,
    .quiet-tag {
      flex: 0 0 auto;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 3px 8px;
      font-size: 12px;
      white-space: nowrap;
    }

    .state-tag {
      color: var(--green);
      border-color: #b9d9cf;
      background: var(--green-soft);
    }

    .risk-tag {
      color: var(--red);
      border-color: #e3bbb6;
      background: var(--red-soft);
    }

    .quiet-tag {
      color: var(--muted);
      background: #f7f8f8;
    }

    .node-text {
      color: var(--muted);
      line-height: 1.65;
      font-size: 13px;
    }

    .gap-summary {
      display: grid;
      gap: 7px;
      padding: 9px;
      border: 1px solid #dce7e3;
      border-radius: 8px;
      background: #f7fbfa;
    }

    .gap-label {
      color: var(--muted);
      font-size: 12px;
    }

    .gap-primary {
      font-weight: 800;
      line-height: 1.45;
    }

    .more-gaps {
      width: max-content;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
    }

    .progress-wrap {
      margin-top: auto;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .progress-track {
      height: 8px;
      border-radius: 999px;
      background: #edf1ef;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--blue));
    }

    .node-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .primary-actions {
      margin-top: auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .node-action {
      min-height: 28px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
    }

    .node-action.primary {
      min-height: 32px;
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .node-action.secondary {
      min-height: 32px;
      color: var(--green);
      border-color: #b9d9cf;
      background: var(--green-soft);
    }

    .month-board {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 12px;
      align-items: stretch;
    }

    .pressure-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(112px, 1fr));
      gap: 10px;
      padding: 12px;
    }

    .pressure-week {
      min-height: 250px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 10px;
    }

    .pressure-column {
      width: 100%;
      min-height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 8px;
      border-radius: var(--radius);
      background: #f4f7f6;
    }

    .pressure-bar {
      width: 64%;
      min-height: 34px;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(180deg, var(--amber), var(--green));
    }

    .pressure-meta {
      display: grid;
      gap: 5px;
    }

    .pressure-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .pressure-keyword {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pressure-tooltip {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: calc(100% - 10px);
      display: none;
      padding: 8px 9px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      box-shadow: var(--shadow);
      font-size: 12px;
      line-height: 1.5;
      z-index: 4;
    }

    .pressure-week:hover .pressure-tooltip,
    .pressure-week:focus .pressure-tooltip {
      display: block;
    }

    .month-suggestion {
      border-top: 1px solid var(--line);
      padding-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .month-suggestion summary {
      cursor: pointer;
      color: var(--green);
      font-weight: 700;
      list-style: none;
    }

    .month-suggestion summary::-webkit-details-marker {
      display: none;
    }

    .side-stack {
      display: grid;
      gap: 12px;
    }

    .insight-panel {
      padding: 14px;
    }

    .insight-title {
      font-weight: 850;
      margin-bottom: 8px;
    }

    .insight-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .insight-list li {
      color: var(--muted);
      line-height: 1.6;
      padding-left: 12px;
      border-left: 3px solid var(--line-strong);
    }

    .semester-map {
      display: grid;
      gap: 12px;
    }

    .map-lane {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .lane-label {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .lane-title {
      font-weight: 850;
    }

    .lane-note {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 12px;
    }

    .lane-track {
      min-height: 118px;
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.84);
    }

    .map-block {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 112px;
    }

    .map-empty {
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: #fbfcfc;
      color: var(--muted);
      display: grid;
      place-items: center;
      min-height: 112px;
      text-align: center;
      padding: 10px;
      line-height: 1.5;
    }

    .tool-rail {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 8px;
      border-left: 1px solid var(--line);
      background: #ffffff;
      overflow-y: auto;
    }

    .tool-btn {
      position: relative;
      width: 48px;
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      display: grid;
      grid-template-rows: 1fr auto;
      place-items: center;
      gap: 2px;
      padding: 5px 2px;
      font-size: 17px;
    }

    .tool-btn:hover,
    .tool-btn.active {
      border-color: var(--green);
      background: var(--green-soft);
      color: var(--green);
    }

    .tool-btn::after {
      content: attr(data-label);
      position: absolute;
      right: 52px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      min-width: max-content;
      max-width: 180px;
      padding: 7px 9px;
      border-radius: 7px;
      background: var(--ink);
      color: #fff;
      font-size: 12px;
      box-shadow: var(--shadow);
      z-index: 8;
    }

    .tool-btn:hover::after {
      display: block;
    }

    .tool-label {
      color: #9aa5a1;
      font-size: 11px;
      line-height: 1;
      font-weight: 700;
    }

    .tool-btn:hover .tool-label,
    .tool-btn.active .tool-label {
      color: var(--green);
    }

    .tool-separator {

      background: #fff;
      color: var(--muted);

      padding: 14px;
      display: grid;
      gap: 12px;

    .field-grid {
      display: grid;
      gap: 8px;

      flex-wrap: wrap;
      gap: 8px;

      align-items: center;

      background: #ffffff;
      color: var(--muted);

    const model = window.PREP_ROOM_RENDER_VIEW_MODEL;
    const byId = (id) => document.getElementById(id);
    const html = (value) => String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");

    function getActiveView() {
      return model.views.find((view) => view.id === model.active_view) || model.views[0];
    }

    function getNodeDetail(nodeId) {
      if (model.node_details[nodeId]) return model.node_details[nodeId];
      const allNodes = model.views.flatMap((view) => [
        ...(view.nodes || []),
        ...(view.weeks || []),
        ...((view.lanes || []).flatMap((lane) => lane.blocks || []))
      ]);
      const node = allNodes.find((item) => item.id === nodeId);
      if (!node) return null;
      return {
        type: "画布节点",
        title: node.title || node.label || node.id,
        fields: Object.entries(node)
          .filter(([key]) => !["id", "actions"].includes(key))
          .map(([key, value]) => [key, Array.isArray(value) ? value.join("、") : value]),
        actions: node.actions || ["生成预演"]
      };
    }

            </ul>
            <div class="chip-row">
              <button class="primary-button" data-pending="小备已生成方案A重排预演，等待教师确认。">采用方案A预演</button>
              <button class="ghost-button" data-pending="小备已生成方案B影响对比，等待教师确认。">对比方案B</button>
            </div>
          </section>
        </div>
      `;
    }

    function renderActiveViewMarkup(view) {
      if (view.id === "weekPackage") return renderWeekPackageCanvas(view);
      if (view.id === "monthProgress") return renderMonthProgressCanvas(view);
      return renderFlexibleSemesterMapCanvas(view);
    }

    function commitCanvasRender(view) {
      const renderLayer = byId("renderLayer");
      renderLayer.innerHTML = renderActiveViewMarkup(view);
      window.requestAnimationFrame(() => {
        renderLayer.classList.remove("is-entering");
      });
      openInspector(model.selected_node_id, { silent: true });
      renderNegotiationPanel();
      renderStatusBar();
      const canvasStage = byId("canvasStage");
      canvasStage.scrollTop = model.view_scroll_positions?.[view.id] || 0;
    }

    function renderPrepRoomCanvas(options = {}) {
      const view = getActiveView();
      renderCanvasHeader(view);
      const renderLayer = byId("renderLayer");
      if (!options.animate) {
        commitCanvasRender(view);
        return;
      }
      renderLayer.classList.add("is-fading");
      window.clearTimeout(model.render_transition_timer);
      model.render_transition_timer = window.setTimeout(() => {
        renderLayer.classList.remove("is-fading");
        renderLayer.classList.add("is-entering");
        commitCanvasRender(view);
      }, 150);
    }

    function toolShortLabel(tool) {
      const map = {
        textbook: "教材",
        unit: "单元",
        split: "拆课",
        weekly: "周历",
        reschedule: "重排",
        flow: "流程",
        worksheet: "学习单",
        search: "检索",
        xiaomei: "小美",
        xiaoping: "小评",
        xiaoguan: "小管"
      };
      return map[tool.id] || tool.title.slice(0, 3);
    }

    function renderToolRail() {
      byId("toolRail").innerHTML = model.tools.map((tool, index) => `
        ${index === 5 ? `<div class="tool-separator" aria-hidden="true"></div>` : ""}
        <button class="tool-btn" data-tool="${html(tool.id)}" data-label="${html(tool.title)}" title="${html(tool.title)}" aria-label="${html(tool.title)}">
          <span class="tool-icon-mark">${html(tool.icon)}</span>
          <span class="tool-label">${html(toolShortLabel(tool))}</span>
        </button>
      `).join("");
    }

    function openInspector(targetId, options = {}) {
      const inspector = byId("inspector");
      const tool = model.tools.find((item) => item.id === targetId);
      const detail = tool
        ? {
            type: "工具详情",
            title: tool.title,
            fields: [["用途", tool.desc], ["边界", "只生成预演，不触发正式调用"], ["工具ID", tool.id]],
            actions: tool.actions
          }
        : getNodeDetail(targetId);

      if (!detail) {
        inspector.classList.add("hidden");
        return;
      }

      if (!tool) {
        model.selected_node_id = targetId;
      }

      inspector.classList.remove("hidden");
      inspector.innerHTML = `
        <div class="inspector-head">
          <div>
            <div class="inspector-kicker">${html(detail.type)}</div>
            <div class="inspector-title">${html(detail.title)}</div>
          </div>
          <button class="icon-close" id="closeInspectorBtn" aria-label="关闭检查器">×</button>
        </div>
        <div class="inspector-body">
          <div class="field-grid">
            ${detail.fields.map(([label, value]) => `
              <div class="field-row">
                <div class="field-label">${html(label)}</div>
                <div class="field-value">${html(value)}</div>
              </div>
            `).join("")}
          </div>
          <div>
            <div class="section-title"><span>可预演动作</span><span class="quiet-tag">需教师确认</span></div>
            <div class="inspector-actions">
              ${detail.actions.map((action) => `<button class="node-action inspector-action" data-pending="小备已生成「${html(action)}」预演，等待教师确认。">${html(action)}</button>`).join("")}
            </div>
          </div>
          <div class="pending-panel" id="inspectorPending">
            ${html(model.pending_changes[0]?.text || "暂无待确认预演。")}
          </div>
        </div>
      `;

      document.querySelectorAll(".canvas-node").forEach((node) => {
        node.classList.toggle("selected", node.dataset.node === model.selected_node_id);
      });
      document.querySelectorAll(".tool-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.tool === targetId);
      });

      if (!options.silent) {
        showToast(tool ? `已打开工具：${detail.title}` : `已选中：${detail.title}`);
      }
    }

    function addPendingChange(text, source = "画布预演") {
      const item = {
        id: `pending-${Date.now()}`,
        text,
        source,
        applied: false
      };
      model.pending_changes.unshift(item);
      renderStatusBar();
      const pending = byId("inspectorPending");
      if (pending) pending.textContent = item.text;
      showToast(text);
    }

    function renderFlowSteps() {
      return `
        <div class="flow-steps" aria-label="课包流转步骤">
          ${model.flow_steps.map((step, index) => `
            <span class="flow-step ${step.current ? "current" : ""}">
              <span class="flow-dot" aria-hidden="true"></span>
              <span>${html(step.label)}</span>
            </span>
            ${index < model.flow_steps.length - 1 ? `<span class="flow-sep" aria-hidden="true">›</span>` : ""}
          `).join("")}
        </div>
      `;
    }

    function renderStatusBar() {
      const latest = model.pending_changes[0];
      byId("statusMain").innerHTML = `
        ${renderFlowSteps()}
        <span class="status-text">${html(latest ? latest.text : "暂无待确认预演。")}</span>
      `;
      byId("statusCount").textContent = `${model.pending_changes.length} 项`;
    }

    let toastTimer = null;
    function showToast(text) {
      const toast = byId("toast");
      toast.textContent = text;
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function selectView(viewId) {
      const canvasStage = byId("canvasStage");
      model.view_scroll_positions[model.active_view] = canvasStage.scrollTop;
      model.active_view = viewId;
      const view = getActiveView();
      const firstNode = view.nodes?.[0]?.id || view.weeks?.[0]?.id || view.lanes?.[0]?.blocks?.[0]?.id;
      model.selected_node_id = firstNode || model.selected_node_id;
      renderPrepRoomCanvas({ animate: true });
      showToast(`已切换到${view.label}画布`);
    }

    function bindEvents() {
      document.body.addEventListener("click", (event) => {
        const viewButton = event.target.closest("[data-view]");
        if (viewButton) {
          selectView(viewButton.dataset.view);
          return;
        }

        const spaceButton = event.target.closest(".space-btn");
        if (spaceButton) {
          event.preventDefault();
          showToast(`进入${spaceButton.getAttribute("aria-label") || "学校空间"}仍为预览入口`);
          return;
        }

        const chatFill = event.target.closest("[data-chat-fill]");
        if (chatFill) {
          const input = byId("chatInput");
          input.value = chatFill.dataset.chatFill;
          input.focus();
          return;
        }

        if (event.target.id === "chatUploadBtn") {
          byId("chatUploadInput").click();
          return;
        }

        if (event.target.id === "chatVoiceBtn") {
          addPendingChange("小备已打开语音意图入口预演，等待教师继续输入。", "小备聊天入口");
          return;
        }

        if (event.target.id === "chatSendBtn") {
          submitChatMessage();
          return;
        }

        const pendingSource = event.target.closest("[data-pending]");
        if (pendingSource) {
          addPendingChange(pendingSource.dataset.pending);
          return;
        }

        const node = event.target.closest("[data-node]");
        if (node) {
          openInspector(node.dataset.node);
          return;
        }

        const tool = event.target.closest("[data-tool]");
        if (tool) {
          openInspector(tool.dataset.tool);
          return;
        }

        const intent = event.target.closest("[data-intent]");
        if (intent) {
          const input = byId("chatInput");
          input.value = input.value ? `${input.value}\n${intent.dataset.intent}` : intent.dataset.intent;
          input.focus();
          return;
        }

        const current = event.target.closest("[data-action='open-current']");
        if (current) {
          openInspector(model.selected_node_id);
          return;
        }

        if (event.target.id === "closeInspectorBtn") {
          byId("inspector").classList.add("hidden");
        }
      });

      byId("chatInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          submitChatMessage();
        }
      });

      byId("chatUploadInput").addEventListener("change", (event) => {
        const files = Array.from(event.target.files || []);
        if (!files.length) return;
        const names = files.slice(0, 3).map((file) => file.name).join("、");
        const more = files.length > 3 ? ` 等${files.length}个文件` : "";
        addPendingChange(`小备已接收资料「${names}${more}」的本地挂载预演，未上传到服务器。`, "资料入口");
        event.target.value = "";
      });

      document.body.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const node = event.target.closest("[data-node]");
        if (node) {
          event.preventDefault();
          openInspector(node.dataset.node);
        }
      });
    }

    function submitChatMessage() {
      const input = byId("chatInput");
      const text = input.value.trim();
      if (!text) {
        showToast("先告诉小备你想调整什么");
        input.focus();
        return;
      }
      model.negotiation.input_value = text;
      addPendingChange(`小备已收到意图：「${text}」，正在生成影响范围预演。`, "小备聊天入口");
      input.value = "";
    }

    function initPrepRoomRenderCanvas() {
      renderToolRail();
      renderNegotiationPanel();
      renderPrepRoomCanvas();
      bindEvents();
    }

    window.renderWeekPackageCanvas = renderWeekPackageCanvas;
    window.renderMonthProgressCanvas = renderMonthProgressCanvas;
    window.renderFlexibleSemesterMapCanvas = renderFlexibleSemesterMapCanvas;
    window.renderToolRail = renderToolRail;
    window.openInspector = openInspector;
    window.addPendingChange = addPendingChange;
    window.renderPrepRoomCanvas = renderPrepRoomCanvas;

    initPrepRoomRenderCanvas();
  </script>
</body>
</html>

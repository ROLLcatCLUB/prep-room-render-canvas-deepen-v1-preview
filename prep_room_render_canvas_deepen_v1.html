<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>师维 · 备课室 | 渲染画布深化 V1</title>
  <style>
    :root {
      --bg: #f5f7f7;
      --panel: #ffffff;
      --panel-soft: #f8fbfa;
      --ink: #1d2723;
      --muted: #66736e;
      --line: #d8e0dc;
      --line-strong: #becbc5;
      --green: #2f7668;
      --green-soft: #e5f2ee;
      --blue: #315f90;
      --blue-soft: #e8f0f8;
      --amber: #ac6a1c;
      --amber-soft: #f7eee2;
      --red: #b34d43;
      --red-soft: #f7e9e7;
      --shadow: 0 18px 48px rgba(29, 39, 35, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(180deg, #ffffff 0, var(--bg) 72px, var(--bg) 100%);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
      border-radius: 999px;
    }

    .icon {
      width: 18px;
      height: 18px;
      display: inline-block;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .icon.sm {
      width: 16px;
      height: 16px;
    }

    .icon.lg {
      width: 20px;
      height: 20px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .topbar {
      min-height: 72px;
      display: grid;
      grid-template-columns: minmax(190px, 0.9fr) minmax(360px, 1.4fr) minmax(260px, 0.9fr);
      align-items: center;
      gap: 18px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
    }

    .logo-area {
      display: flex;
      align-items: baseline;
      gap: 7px;
      min-width: 0;
    }

    .logo-mark {
      font-size: 25px;
      color: var(--green);
      font-weight: 900;
      line-height: 1;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 850;
      line-height: 1;
      color: #244c42;
      white-space: nowrap;
    }

    .logo-sub {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .space-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .space-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      text-decoration: none;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    .space-btn:hover {
      transform: translateY(-1px);
      background: var(--green-soft);
      border-color: #b9d9cf;
    }

    .space-btn.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
      box-shadow: 0 8px 18px rgba(47, 118, 104, 0.16);
    }

    .nav-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
    }

    .search-box {
      min-width: 0;
      max-width: 230px;
      height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
    }

    .search-box input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
    }

    .search-box .icon {
      color: var(--green);
      opacity: 0.75;
    }

    .nav-icon,
    .user-avatar {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--green);
      position: relative;
    }

    .nav-icon .icon,
    .user-avatar .icon,
    .space-btn .icon {
      width: 19px;
      height: 19px;
    }

    .nav-badge {
      position: absolute;
      top: -3px;
      right: -4px;
      min-width: 16px;
      height: 16px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #d46a4c;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
    }

    .context-bar {
      min-height: 54px;
      display: grid;
      grid-template-columns: minmax(360px, 1fr) auto minmax(160px, 1fr);
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfdfb;
    }

    .context-title {
      min-width: 0;
      justify-self: center;
      padding: 0 10px;
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      font-size: 26px;
      line-height: 1.1;
      font-weight: 950;
      color: var(--green);
      text-shadow: 0 10px 24px rgba(47, 118, 104, 0.18);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .context-space-name {
      color: transparent;
      background: linear-gradient(135deg, #1f6f61 0%, #2f7668 42%, #315f90 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .context-view-name {
      font-size: 0.72em;
      font-weight: 850;
      opacity: 0.82;
      color: #2f7668;
      text-shadow: none;
    }

    .context-meta {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .context-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid #cfe0d9;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      max-width: 100%;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill.strong {
      color: var(--green);
      border-color: #b9d9cf;
      background: var(--green-soft);
      font-weight: 700;
    }

    .workspace {
      height: calc(100vh - 72px - 54px - 78px - 42px);
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
      overflow: hidden;
    }

    .intent-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: #fbfdfc;
      overflow: hidden;
    }

    .panel-scroll {
      min-height: 0;
      overflow: auto;
      padding: 16px;
    }

    .assistant-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .assistant-avatar {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .assistant-name {
      font-weight: 800;
    }

    .assistant-role {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
      line-height: 1.5;
    }

    .section {
      margin-top: 14px;
      padding: 14px 0 0;
      border-top: 1px solid var(--line);
    }

    .section:first-of-type {
      border-top: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      font-weight: 800;
      font-size: 13px;
    }

    .section-caption {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .intent-input {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      padding: 10px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      outline: none;
      line-height: 1.7;
    }

    .intent-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 118, 104, 0.12);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .intent-chip,
    .text-button,
    .primary-button,
    .ghost-button {
      min-height: 32px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 0 14px;
    }

    .intent-chip {
      color: var(--muted);
      font-size: 12px;
    }

    .intent-chip:hover,
    .text-button:hover,
    .ghost-button:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-soft);
    }

    .primary-button {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
      font-weight: 700;
    }

    .primary-button:hover {
      background: #255f54;
    }

    .ghost-button {
      color: var(--green);
      border-color: #b9d9cf;
      background: var(--green-soft);
      font-weight: 700;
    }

    .result-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .result-list li {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      line-height: 1.65;
    }

    .agent-note {
      padding: 12px;
      border-left: 3px solid var(--green);
      background: var(--green-soft);
      border-radius: 0 var(--radius) var(--radius) 0;
      line-height: 1.7;
      color: #24453e;
    }

    .prep-render-canvas {
      position: relative;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(216, 224, 220, 0.45) 1px, transparent 1px),
        linear-gradient(0deg, rgba(216, 224, 220, 0.45) 1px, transparent 1px),
        #f9fbfa;
      background-size: 28px 28px;
    }

    .view-tabs {
      justify-self: end;
      display: inline-grid;
      grid-template-columns: repeat(4, 42px);
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
    }

    .view-tab {
      width: 42px;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      white-space: nowrap;
    }

    .view-tab.active {
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .ai-tool-strip {
      min-height: 56px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(12px);
    }

    .ai-tool-label {
      min-width: 34px;
      min-height: 34px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid #b9d9cf;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
    }

    .canvas-stage {
      position: relative;
      min-height: 0;
      flex: 1;
      overflow: auto;
      padding: 18px;
    }

    .render-layer {
      min-width: 780px;
      min-height: 100%;
      position: relative;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .render-layer.is-fading {
      opacity: 0;
      transform: translateY(8px);
    }

    .render-layer.is-entering {
      opacity: 0;
      transform: translateY(8px);
    }

    .canvas-band {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 34px rgba(29, 39, 35, 0.08);
    }

    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .metric {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
    }

    .metric-value {
      font-size: 22px;
      font-weight: 850;
      color: var(--ink);
    }

    .metric.week-metric {
      display: flex;
      align-items: center;
      gap: 12px;
      border-color: #abd5ca;
      background: linear-gradient(135deg, #e8f5f1, #ffffff);
    }

    .metric.week-metric .metric-value {
      min-width: 76px;
      min-height: 54px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 25px;
      box-shadow: 0 10px 22px rgba(47, 118, 104, 0.18);
    }

    .metric.week-metric .metric-label {
      margin-top: 0;
      font-weight: 800;
      color: var(--green);
    }

    .metric-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .week-board {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .canvas-node {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      transition: border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
      outline: none;
    }

    .canvas-node:hover,
    .canvas-node:focus {
      border-color: var(--green);
      box-shadow: 0 12px 24px rgba(47, 118, 104, 0.12);
      transform: translateY(-1px);
    }

    .canvas-node.selected {
      border-color: var(--green);
      box-shadow: inset 0 0 0 2px rgba(47, 118, 104, 0.2), 0 14px 30px rgba(47, 118, 104, 0.14);
    }

    .week-card {
      min-height: 230px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .wc-scene {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }

    .wc-control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .wc-control-cluster,
    .wc-mode-switcher,
    .wc-legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .wc-chip {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .wc-chip.active {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
      box-shadow: 0 8px 18px rgba(47, 118, 104, 0.14);
    }

    .wc-chip.week {
      color: var(--green);
      border-color: #b9d9cf;
      background: var(--green-soft);
    }

    .wc-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .wc-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      flex: 0 0 auto;
    }

    .wc-dot.today { background: #1e6f60; }
    .wc-dot.warning,
    .wc-dot.activity { background: var(--amber); }
    .wc-dot.reschedule { background: var(--blue); }
    .wc-dot.holiday { background: #c76d66; }
    .wc-dot.makeup { background: #7565d4; }
    .wc-dot.future { background: #8c9894; }

    .wc-main-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(230px, 0.28fr);
      gap: 12px;
      overflow: auto;
    }

    .wc-calendar-board,
    .wc-side-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.93);
      box-shadow: 0 12px 30px rgba(29, 39, 35, 0.05);
    }

    .wc-calendar-board {
      min-width: 0;
      overflow: auto;
    }

    .wc-header-row,
    .wc-period-row {
      display: grid;
      grid-template-columns: minmax(64px, 0.5fr) repeat(7, minmax(112px, 1fr));
      width: 100%;
      min-width: 980px;
    }

    .wc-header-row {
      position: sticky;
      top: 0;
      z-index: 3;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
    }

    .wc-corner,
    .wc-day-head,
    .wc-period-label,
    .wc-cell {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .wc-corner,
    .wc-day-head,
    .wc-period-label {
      min-height: 54px;
      display: grid;
      place-items: center;
      padding: 8px;
      text-align: center;
      font-weight: 900;
    }

    .wc-day-date {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .wc-day-head.today {
      color: var(--green);
      background: linear-gradient(135deg, rgba(224, 243, 237, 0.98), rgba(255, 255, 255, 0.96));
      box-shadow: inset 0 -3px 0 var(--green);
    }

    .wc-day-head.workday {
      color: #6857c8;
      background: #f5f2ff;
    }

    .wc-day-head.weekend {
      color: var(--muted);
      background: #f6f8f7;
    }

    .wc-period-label {
      position: sticky;
      left: 0;
      z-index: 2;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
    }

    .wc-cell {
      min-height: 74px;
      display: grid;
      align-items: center;
      justify-items: center;
      padding: 8px;
      background: rgba(255, 255, 255, 0.62);
    }

    .wc-cell.today {
      background: rgba(224, 243, 237, 0.36);
    }

    .wc-cell.future,
    .wc-cell.weekend {
      background: rgba(243, 246, 245, 0.64);
    }

    .wc-empty {
      width: 28px;
      height: 1px;
      background: #dfe7e4;
    }

    .wc-course-card {
      width: min(100%, 150px);
      display: grid;
      gap: 3px;
      justify-items: center;
      padding: 8px 9px;
      border: 1px solid #b9d9cf;
      border-radius: 8px;
      background: linear-gradient(135deg, #edf8f5, #fff);
      color: #244c42;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .wc-course-class {
      font-size: 13px;
      font-weight: 930;
    }

    .wc-course-title {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .wc-course-status {
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
    }

    .wc-course-card.today { border-color: var(--green); box-shadow: inset 4px 0 0 var(--green); }
    .wc-course-card.warning { border-color: #efc49c; background: var(--amber-soft); color: var(--amber); }
    .wc-course-card.activity { border-color: #efc49c; background: var(--amber-soft); color: var(--amber); }
    .wc-course-card.reschedule { border-color: #abc4f1; background: var(--blue-soft); color: var(--blue); }
    .wc-course-card.holiday { border-color: #f1b7b1; background: var(--red-soft); color: var(--red); }
    .wc-course-card.makeup { border-color: #c8c0f4; background: #f0edff; color: #6857c8; }
    .wc-course-card.future { border-color: #d3dbd8; background: #f3f5f4; color: #4e5a56; }
    .wc-course-card.done { border-color: #c8e2d8; background: #f1faf6; color: var(--green); }

    .wc-side-panel {
      padding: 12px;
      overflow: auto;
    }

      bottom: 116px;
      left: 327px;

        radial-gradient(ellipse at center, rgba(255, 255, 255, 0.92) 0 33%, rgba(113, 121, 111, 0.45) 34% 45%, transparent 47%) center 0 / 34px 130px repeat-y;

    .nb-panel::after {
      content: "";
      position: absolute;
      top: 88px;
      right: -9px;
      width: 18px;
      height: calc(100% - 150px);
      background:
        radial-gradient(ellipse at center, rgba(255,255,255,0.96) 0 32%, rgba(104,111,102,0.5) 33% 43%, transparent 46%) center 0 / 18px 130px repeat-y;

      width: 34px;
      height: 60px;

    .cps-unit-mark {
      width: 7px;
      height: 18px;
      border-radius: 999px;
      background: var(--green);
      flex: 0 0 auto;
    }

    .cps-unit-mark.blue { background: var(--blue); }
    .cps-unit-mark.amber { background: var(--amber); }

    .cps-unit-hours {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .cps-catalog-lessons {
      display: grid;
      gap: 6px;
      padding-left: 14px;
      border-left: 1px solid var(--line);
      margin-left: 3px;
    }

    .cps-catalog-lesson {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 6px;
      align-items: center;
      border: 0;
      background: transparent;
      color: var(--muted);
      text-align: left;
      padding: 0;
      border-radius: 0;
      font-size: 13px;
    }

    .cps-catalog-lesson.active,
    .cps-catalog-lesson:hover {
      color: var(--green);
      font-weight: 850;
    }

    .cps-board {
      min-width: 0;
      overflow: auto;
    }

    .cps-class-header-row,
    .cps-week-row {
      display: grid;
      grid-template-columns: minmax(92px, 0.56fr) repeat(5, minmax(128px, 1fr));
      width: 100%;
      min-width: 100%;
    }

    .cps-class-header-row {
      position: sticky;
      top: 0;
      z-index: 3;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
    }

    .cps-corner-cell,
    .cps-class-header,
    .cps-week-axis,
    .cps-class-week-cell {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .cps-corner-cell,
    .cps-class-header {
      min-height: 56px;
      display: grid;
      place-items: center;
      padding: 8px;
      text-align: center;
    }

    .cps-class-name {
      font-weight: 930;
    }

    .cps-class-progress {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .cps-class-header.risk .cps-class-name::after {
      content: "";
      display: inline-block;
      width: 7px;
      height: 7px;
      margin-left: 6px;
      border-radius: 999px;
      background: var(--red);
      vertical-align: middle;
    }

    .cps-week-row.current {
      position: relative;
      background: linear-gradient(90deg, rgba(47, 118, 104, 0.16), rgba(47, 118, 104, 0.045));
      box-shadow: inset 5px 0 0 var(--green), inset 0 0 0 1px rgba(47, 118, 104, 0.2);
    }

    .cps-week-row.future {
      background: rgba(243, 246, 245, 0.68);
    }

    .cps-week-row.current .cps-week-axis {
      background: linear-gradient(135deg, rgba(224, 243, 237, 0.98), rgba(255, 255, 255, 0.96));
      color: var(--green);
    }

    .cps-week-row.current .cps-week-title::before {
      content: ">";
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      margin-right: 6px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 13px;
      line-height: 1;
      vertical-align: 1px;
    }

    .cps-week-axis {
      min-height: 96px;
      display: grid;
      place-items: center;
      padding: 8px;
      position: sticky;
      left: 0;
      z-index: 2;
      background: rgba(255, 255, 255, 0.94);
      text-align: center;
    }

    .cps-week-title {
      font-size: 16px;
      font-weight: 930;
    }

    .cps-week-date {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .cps-today-mark {
      margin-top: 7px;
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .cps-class-week-cell {
      min-height: 96px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.66);
    }

    .cps-weekly-slot-stack {
      display: grid;
      grid-template-rows: repeat(2, 1fr);
      gap: 6px;
      height: 100%;
      min-height: 80px;
    }

    .cps-schedule-slot {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cps-slot-card {
      min-width: 0;
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 9px;
      border: 1px solid #b9d9cf;
      border-radius: 7px;
      background: linear-gradient(135deg, #edf8f5, #fff);
      color: #244c42;
      font-size: 13px;
      font-weight: 780;
      text-align: center;
      overflow: hidden;
    }

    .cps-slot-card .lesson-code {
      flex: 0 0 auto;
      min-width: 32px;
      white-space: nowrap;
    }

    .cps-slot-card span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cps-slot-card.activity { border-color: #efc49c; background: var(--amber-soft); color: var(--amber); }
    .cps-slot-card.holiday { border-color: #f1b7b1; background: var(--red-soft); color: var(--red); }
    .cps-slot-card.reschedule { border-color: #abc4f1; background: var(--blue-soft); color: var(--blue); }
    .cps-slot-card.delay,
    .cps-slot-card.makeup { border-color: #c8c0f4; background: #f0edff; color: #6857c8; }
    .cps-slot-card.future { border-color: #d3dbd8; background: #f3f5f4; color: #68736f; }
    .cps-slot-card.empty { border-style: dashed; background: #fbfcfc; color: #9ba6a2; font-weight: 650; }

    .cps-week-row.future .cps-slot-card {
      color: #4e5a56;
    }


    .cps-suggestion-list {
      display: grid;
      gap: 10px;
    }

    .cps-suggestion-item {
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
    }

    .cps-suggestion-index {
      width: 20px;
      height: 20px;
      display: inline-grid;
      place-items: center;
      margin-right: 6px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
    }

    .cps-suggestion-text {
      margin-top: 7px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }

    .side-stack {
      display: grid;
      gap: 12px;
    }

    .insight-panel {
      padding: 14px;
    }

    .insight-title {
      font-weight: 850;
      margin-bottom: 8px;
    }

    .insight-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .insight-list li {
      color: var(--muted);
      line-height: 1.6;
      padding-left: 12px;
      border-left: 3px solid var(--line-strong);
    }

    .semester-map {
      display: grid;
      gap: 12px;
    }

    .semester-plan {
      display: grid;
      grid-template-columns: minmax(260px, 0.34fr) minmax(620px, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .unit-catalog,
    .week-plan-board {
      min-height: 520px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 28px rgba(29, 39, 35, 0.04);
    }

    .plan-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      font-weight: 900;
    }

    .unit-list {
      display: grid;
      gap: 14px;
    }

    .unit-group {
      display: grid;
      gap: 8px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .unit-group:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .unit-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 850;
    }

    .unit-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .unit-color-mark {
      width: 7px;
      height: 18px;
      border-radius: 999px;
      background: var(--green);
      flex: 0 0 auto;
    }

    .unit-hours {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .lesson-list {
      display: grid;
      gap: 7px;
      padding-left: 16px;
      border-left: 1px solid var(--line);
      margin-left: 3px;
    }

    .lesson-line {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .lesson-code {
      color: var(--green);
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .week-plan-list {
      display: grid;
      gap: 7px;
    }

    .week-row {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr);
      gap: 10px;
      align-items: stretch;
    }

    .week-label {
      min-height: 46px;
      display: grid;
      place-items: center;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      text-align: center;
    }

    .week-name {
      font-weight: 900;
    }

    .week-date {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .week-slots {
      min-height: 46px;
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 8px;
      align-items: center;
      padding: 6px 10px;
      border: 1px solid #e2e8e5;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.74);
    }

    .plan-lesson {
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid #b9d9cf;
      background: linear-gradient(135deg, #edf8f5, #ffffff);
      color: #244c42;
      font-weight: 750;
    }

    .plan-lesson .lesson-code {
      color: var(--green);
      min-width: 34px;
    }

    .plan-lesson.blue {
      border-color: #b7cbed;
      background: linear-gradient(135deg, #eef5ff, #ffffff);
    }

    .plan-lesson.blue .lesson-code {
      color: #2f63bd;
    }

    .plan-lesson.amber {
      border-color: #efcaa5;
      background: linear-gradient(135deg, #fff6ed, #ffffff);
    }

    .plan-lesson.amber .lesson-code {
      color: #c06318;
    }

    .plan-lesson.buffer {
      color: var(--muted);
      border-color: #dce3df;
      background: #fbfcfc;
      font-weight: 650;
    }

    .map-lane {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .lane-label {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .lane-title {
      font-weight: 850;
    }

    .lane-note {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 12px;
    }

    .lane-track {
      min-height: 118px;
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.84);
    }

    .map-block {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 112px;
    }

    .map-empty {
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: #fbfcfc;
      color: var(--muted);
      display: grid;
      place-items: center;
      min-height: 112px;
      text-align: center;
      padding: 10px;
      line-height: 1.5;
    }

    .tool-rail {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 7px;
      min-width: 0;
      padding: 0;
      background: transparent;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
    }

    .tool-btn {
      position: relative;
      width: 38px;
      height: 38px;
      min-height: 38px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--green);
      display: inline-grid;
      place-items: center;
      padding: 0;
    }

    .tool-btn:hover,
    .tool-btn.active {
      border-color: var(--green);
      background: var(--green-soft);
      color: var(--green);
    }

    .tool-btn::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      top: calc(100% + 8px);
      transform: translateX(-50%);
      display: none;
      min-width: max-content;
      max-width: 180px;
      padding: 7px 9px;
      border-radius: 7px;
      background: var(--ink);
      color: #fff;
      font-size: 12px;
      box-shadow: var(--shadow);
      z-index: 8;
    }

    .tool-btn:hover::after {
      display: block;
    }

    .tool-label {
      display: none;
    }

    .tool-btn:hover .tool-label,
    .tool-btn.active .tool-label {
      color: var(--green);
    }

    .tool-separator {
      width: 1px;
      height: 24px;
      background: var(--line);
      margin: 0 2px;
      flex: 0 0 auto;
    }

    .inspector {
      position: absolute;
      top: var(--inspector-top, 18px);
      left: var(--inspector-left, auto);
      right: auto;
      width: min(340px, calc(100% - 36px));
      max-height: calc(100% - 36px);
      overflow: auto;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      z-index: 5;
    }

    .inspector.hidden {
      display: none;
    }

    .inspector-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .inspector-kicker {
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .inspector-title {
      font-size: 16px;
      font-weight: 850;
      line-height: 1.35;
    }

    .icon-close {
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--muted);
    }

    .inspector-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .field-grid {
      display: grid;
      gap: 8px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 90px minmax(0, 1fr);
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
    }

    .field-row:last-child {
      border-bottom: 0;
    }

    .field-label {
      color: var(--muted);
      font-size: 12px;
    }

    .field-value {
      line-height: 1.55;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .inspector-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pending-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--amber-soft);
      padding: 10px;
      color: #5c3b17;
      line-height: 1.6;
    }

    .status-strip {
      height: 42px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr) 64px;
      align-items: center;
      border-top: 1px solid var(--line);
      background: #ffffff;
      color: var(--muted);
      font-size: 12px;
    }

    .status-cell {
      min-width: 0;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
      white-space: nowrap;
    }

    .status-main {
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .status-text {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .flow-steps {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .flow-step {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #9aa5a1;
      white-space: nowrap;
    }

    .flow-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #cbd5d1;
    }

    .flow-step.current {
      color: var(--green);
      font-weight: 800;
    }

    .flow-step.current .flow-dot {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(47, 118, 104, 0.12);
    }

    .flow-sep {
      color: #c4ceca;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 56px;
      transform: translateX(-50%) translateY(12px);
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 10;
      max-width: min(680px, calc(100vw - 32px));
      line-height: 1.55;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .xiaobei-chat-entry {
      height: 78px;
      display: grid;
      grid-template-columns: 226px minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      border-top: 1px solid var(--line);
      background: #ffffff;
    }

    .chat-agent {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .chat-avatar {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 12px;
      background: var(--green);
      color: #fff;
      font-weight: 900;
    }

    .chat-agent-name {
      font-weight: 850;
      line-height: 1.25;
    }

    .chat-agent-role {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-input-shell {
      min-width: 0;
      min-height: 50px;
      display: grid;
      grid-template-columns: 38px 38px minmax(0, 1fr) 38px;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      background: #fbfdfc;
    }

    .chat-tool,
    .chat-send {
      border: 1px solid var(--line);
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #fff;
      color: var(--green);
      font-weight: 850;
    }

    .chat-tool:hover {
      background: var(--green-soft);
      border-color: #b9d9cf;
    }

    .chat-send {
      width: 34px;
      min-width: 34px;
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .chat-input {
      width: 100%;
      min-width: 0;
      height: 38px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      padding: 0 4px;
    }

    .chat-upload-input {
      display: none;
    }

    @media (max-width: 1180px) {
      .topbar {
        grid-template-columns: minmax(180px, 0.8fr) minmax(300px, 1.2fr) minmax(220px, 0.8fr);
      }

      .space-nav {
        gap: 7px;
      }

      .space-btn {
        width: 38px;
        height: 38px;
      }

      .view-tabs {
        width: max-content;
      }

      .week-board,
      .lane-track {
        grid-template-columns: repeat(3, minmax(150px, 1fr));
      }
    }

    @media (max-width: 1080px) and (min-width: 901px) {
      .status-strip {
        grid-template-columns: 220px minmax(0, 1fr) 64px;
      }
    }

    @media (max-width: 900px) {
      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
      }

      body {
        overflow-y: auto;
      }

      .topbar {
        height: auto;
        min-height: 58px;
        grid-template-columns: 1fr;
        align-items: flex-start;
        padding: 12px;
        width: 100%;
        max-width: 100vw;
      }

      .space-nav,
      .nav-right {
        width: 100%;
        max-width: calc(100vw - 24px);
        flex-wrap: wrap;
        justify-content: flex-start;
      }

      .nav-right {
        display: grid;
        grid-template-columns: 38px 38px;
      }

      .search-box {
        max-width: none;
        width: calc(100vw - 24px);
        grid-column: 1 / -1;
      }

      .context-bar {
        align-items: flex-start;
        grid-template-columns: 1fr;
        padding: 10px 12px;
      }

      .context-title {
        width: auto;
        justify-self: center;

      file: '<path d="M6 3h8l4 4v14H6z"></path><path d="M14 3v5h5"></path><path d="M9 13h6"></path><path d="M9 17h4"></path>',
      wand: '<path d="m4 20 12-12"></path><path d="m14 6 4 4"></path><path d="M6 4v3"></path><path d="M4.5 5.5h3"></path><path d="M19 15v3"></path><path d="M17.5 16.5h3"></path>',
      calendar: '<path d="M5 4h14v16H5z"></path><path d="M8 2v4"></path><path d="M16 2v4"></path><path d="M5 9h14"></path>',
      map: '<path d="m4 6 5-2 6 2 5-2v14l-5 2-6-2-5 2z"></path><path d="M9 4v14"></path><path d="M15 6v14"></path>',
      plus: '<path d="M12 5v14"></path><path d="M5 12h14"></path>',
      arrow: '<path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path>'
    };

    function icon(name, size = "") {
      const body = icons[name] || icons.arrow;
      return `<svg class="icon ${size}" viewBox="0 0 24 24" aria-hidden="true">${body}</svg>`;
    }

    function sr(text) {
      return `<span class="sr-only">${html(text)}</span>`;
    }

    function iconButtonLabel(text, iconName, iconOnly = true) {
      return `${icon(iconName)}${iconOnly ? sr(text) : `<span>${html(text)}</span>`}`;
    }

    function iconForAction(action) {
      const text = String(action || "");
      if (/送入|预览|大屏|课堂/.test(text)) return "monitor";
      if (/完善|补齐|检查|确认|完成/.test(text)) return "check";
      if (/重排|重组|调整|更新/.test(text)) return "refresh";
      if (/拆|压缩/.test(text)) return "scissors";
      if (/评价|量规|互评|小评/.test(text)) return "star";
      if (/资料|材料|查看|检索|学习单/.test(text)) return "file";
      if (/生成|预置|方案|小美/.test(text)) return "wand";
      return "arrow";
    }

    function iconForView(viewId) {
      if (viewId === "weekCalendar") return "calendar";
      if (viewId === "prepNotebook") return "worksheet";
      if (viewId === "classProgressSchedule") return "layers";
      if (viewId === "flexibleSemesterMap") return "map";
      return "prep";
    }

    function iconForTool(toolId) {
      const map = {
        textbook: "knowledge",
        unit: "layers",
        split: "scissors",
        weekly: "calendar",
        reschedule: "refresh",
        flow: "flow",
        worksheet: "worksheet",
        search: "search",
        xiaomei: "palette",
        xiaoping: "star",
        xiaoguan: "archive"
      };
      return map[toolId] || "wand";
    }

    function hydrateShellIcons() {
      const spaceIcons = {
        "大厅": "home",
        "教室": "classroom",
        "备课室": "prep",
        "课堂观察": "eye",
        "作品馆": "gallery",
        "知识馆": "knowledge",
        "档案室": "archive"
      };
      document.querySelectorAll(".space-btn").forEach((button) => {
        const label = button.getAttribute("aria-label") || "";
        button.title = label;
        button.innerHTML = iconButtonLabel(label, spaceIcons[label] || "home");
      });

      const searchIcon = document.querySelector(".search-box span");
      if (searchIcon) searchIcon.outerHTML = icon("search", "sm");

      const notification = document.querySelector(".nav-icon");
      if (notification) {
        notification.title = "通知";
        notification.innerHTML = `${iconButtonLabel("通知", "bell")}<span class="nav-badge">2</span>`;
      }

      const avatar = document.querySelector(".user-avatar");
      if (avatar) {
        avatar.title = "教师账号";
        avatar.innerHTML = iconButtonLabel("教师账号", "user");
      }

      const upload = byId("chatUploadBtn");
      if (upload) {
        upload.title = "上传资料";
        upload.innerHTML = iconButtonLabel("上传资料", "upload");
      }

      const voice = byId("chatVoiceBtn");
      if (voice) {
        voice.title = "语音输入";
        voice.innerHTML = iconButtonLabel("语音输入", "mic");
      }

      const send = byId("chatSendBtn");
      if (send) {
        send.title = "发送";
        send.setAttribute("aria-label", "发送");
        send.innerHTML = iconButtonLabel("发送", "send");
      }
    }

    function getActiveView() {
      return model.views.find((view) => view.id === model.active_view) || model.views[0];
    }

    function getPlanLessonDetail(nodeId) {
      const planView = model.views.find((view) => view.id === "flexibleSemesterMap");
      if (!planView || !String(nodeId).startsWith("plan-")) return null;
      const lessonId = String(nodeId).replace(/^plan-/, "");
      const week = (planView.plan_weeks || []).find((item) => item.lessons.some(([code]) => code === lessonId));
      const lesson = week?.lessons.find(([code]) => code === lessonId);
      if (!lesson) return null;
      const [code, title, tone] = lesson;
      return {
        type: "学期规划课时",
        title: code.startsWith("buffer") || code === "final-show" ? title : `${code} ${title}`,
        fields: [
          ["周次", week.week],
          ["日期", week.date],
          ["单元类型", tone === "blue" ? "造型表现单元" : tone === "amber" ? "综合探索单元" : tone === "buffer" ? "机动与评价" : "色彩单元"],
          ["正式边界", "仅生成预演，教师确认前不应用"]
        ],
        actions: ["调整周次", "生成课包", "查看影响"]
      };
    }

    function getNodeDetail(nodeId) {
      const nbElement = Array.from(document.querySelectorAll("[data-nb-detail]")).find((item) => item.dataset.node === nodeId);
      if (nbElement) {
        const detail = JSON.parse(nbElement.dataset.nbDetail);
        return {
          type: detail.type,
          title: `${detail.code} ${detail.title}`,
          fields: [
            ["所在目录", detail.group],
            ["当前状态", detail.status],
            ["空间边界", "备课本过程态，不等同于资料室或档案室"],
            ["正式边界", "仅生成预演，教师确认前不应用"]
          ],
          actions: ["打开工作页", "补齐课前包", "查看资料", "写课后记录"]
        };
      }
      const wcElement = Array.from(document.querySelectorAll("[data-wc-detail]")).find((item) => item.dataset.node === nodeId);
      if (wcElement) {
        const detail = JSON.parse(wcElement.dataset.wcDetail);
        return {
          type: "课前包详情",
          title: detail.code ? `${detail.classLabel} ${detail.code} ${detail.title}` : detail.title,
          fields: [
            ["时间", `${detail.day} ${detail.date} ${detail.period}`],
            ["班级", detail.classLabel || "全校/活动"],
            ["类型", wcCardTypeLabel(detail.type)],
            ["课前包状态", detail.packageStatus],
            ["已准备", detail.type === "warning" ? "课时设计、资源参考" : "课时设计、学习单、资源参考"],
            ["待处理", detail.type === "warning" ? "学习单/评价量规待确认" : "无正式写入，仅预演"],
            ["上次轻记录", detail.classLabel ? "学生对材料组合和色彩关系需要更多示范。" : "事件占用将影响后续课时落点。"]
          ],
          actions: ["打开课时设计", "确认学习单", "生成量规", "顺手记一笔"]
        };
      }
      const cpsElement = Array.from(document.querySelectorAll("[data-cps-detail]")).find((item) => item.dataset.node === nodeId);
      if (cpsElement) {
        const detail = JSON.parse(cpsElement.dataset.cpsDetail);
        return {
          type: "班级课时实例",
          title: detail.code ? `${detail.code} ${detail.title}` : detail.title,
          fields: [
            ["班级", detail.classLabel],
            ["周次", `${detail.week} ${detail.date}`],
            ["槽位", detail.slot],
            ["类型", cpsCardTypeLabel(detail.type)],
            ["联动", detail.type === "lesson" || detail.type === "future" ? "课包、学习单、评价量规、材料" : "小教调整候选、影响范围"],
            ["正式边界", "仅生成预演，教师确认前不应用"]
          ],
          actions: detail.type === "lesson" || detail.type === "future" ? ["查看课包", "推送下节准备", "生成量规"] : ["查看影响", "采用调整", "暂不处理"]
        };
      }
      const planDetail = getPlanLessonDetail(nodeId);
      if (planDetail) return planDetail;
      if (model.node_details[nodeId]) return model.node_details[nodeId];
      const allNodes = model.views.flatMap((view) => [
        ...(view.nodes || []),
        ...(view.weeks || []),
        ...((view.lanes || []).flatMap((lane) => lane.blocks || []))
      ]);
      const node = allNodes.find((item) => item.id === nodeId);
      if (!node) return null;
      return {
        type: "画布节点",
        title: node.title || node.label || node.id,
        fields: Object.entries(node)
          .filter(([key]) => !["id", "actions"].includes(key))
          .map(([key, value]) => [key, Array.isArray(value) ? value.join("、") : value]),
        actions: node.actions || ["生成预演"]
      };
    }

    function wcCardTypeLabel(type) {
      const map = {
        lesson: "正常上课",
        today: "今日课时",

        reschedule: "调课",
        activity: "活动占用",
        holiday: "停课",
        makeup: "补课/顺延",
        done: "已完成"
      };
      return map[type] || "课时";
    }

    function nbStatusLabel(status) {
      const map = {
        done: "已完成",
        warn: "待确认",
        draft: "草稿",
        missing: "缺材料"
      };
      return map[status] || "过程态";
    }

              </section>

                <div class="wc-side-title"><span>本周课前包</span><span class="quiet-tag">统计</span></div>
                <div class="wc-summary-row">
                  ${view.package_summary.map(([label, value]) => `<div class="wc-summary-cell"><strong>${html(value)}</strong>${html(label)}</div>`).join("")}
                </div>
              </section>
              <div class="chip-row" style="margin-top: 12px;">
                <button class="node-action primary" data-pending="小教已打开课前包处理预演，等待教师确认。">${iconButtonLabel("打开课前包", "arrow")}</button>
                <button class="node-action secondary" data-pending="小教已生成缺失材料候选，等待教师确认。">${iconButtonLabel("生成缺失材料", "wand")}</button>
              </div>
            </aside>
          </div>
        </div>
      `;
    }

    function cpsCardTypeLabel(type) {
      const map = {
        lesson: "课时",
        activity: "活动",
        holiday: "停课",
        reschedule: "调课",
        delay: "顺延",
        makeup: "补课",
        future: "未来",
        empty: "空"
      };
      return map[type] || "课时";
    }

    function renderClassProgressSlot(slot, week, klass, index) {
      const [type, code, title] = slot || ["empty", "", "未排课"];
      const cardType = week.state === "future" && type === "lesson" ? "future" : type;
      const detail = {
        week: week.label,
        date: week.date,
        classLabel: klass.label,
        slot: `第${index + 1}课时`,
        type: cardType,
        code,
        title
      };
      const nodeId = `cps-${week.id}-${klass.id}-${index + 1}`;
      return `
        <div class="cps-schedule-slot">
          <button class="cps-slot-card ${html(cardType)}" type="button" data-node="${html(nodeId)}" data-cps-detail="${html(JSON.stringify(detail))}" title="${html(title || cpsCardTypeLabel(cardType))}">
            <span class="lesson-code">${html(code)}</span>
            <span>${html(title || cpsCardTypeLabel(cardType))}</span>
          </button>
        </div>
      `;
    }

    function renderClassProgressScheduleCanvas(view) {
      return `
        <div class="cps-scene">
          <div class="cps-control-row">
            <div class="cps-control-cluster">
              <div class="cps-grade-switcher" aria-label="年级切换">
                ${view.grade_options.map((grade) => `<button class="cps-grade-btn ${grade.id === view.active_grade ? "active" : ""}" type="button" data-pending="已切换到${html(grade.label)}排课看板预演，等待接入真实课表。">${html(grade.label)}</button>`).join("")}
              </div>
              <div class="cps-summary-row" aria-label="排课摘要">
                ${view.metrics.map((metric) => `
                  <div class="cps-summary-card" title="${html(metric.label)}">
                    <div class="cps-summary-icon">${icon(metric.label.includes("班") ? "classes" : metric.label.includes("一致") ? "check" : metric.label.includes("调整") ? "clock" : "calendar")}</div>
                    <div class="cps-summary-value">${html(metric.value)}</div>
                  </div>
                `).join("")}
              </div>
              <div class="cps-legend-row" aria-label="排课状态图例">
                <span class="cps-legend-item"><span class="cps-legend-dot"></span>正常课时</span>
                <span class="cps-legend-item"><span class="cps-legend-dot future"></span>未来课</span>
                <span class="cps-legend-item"><span class="cps-legend-dot activity"></span>活动</span>
                <span class="cps-legend-item"><span class="cps-legend-dot holiday"></span>节假日</span>
                <span class="cps-legend-item"><span class="cps-legend-dot reschedule"></span>调课</span>
                <span class="cps-legend-item"><span class="cps-legend-dot makeup"></span>补课/顺延</span>
              </div>
            </div>
            <div class="cps-mode-switcher" aria-label="视图模式">
              <button class="cps-mode-btn active" type="button">全班对照</button>
              <button class="cps-mode-btn" type="button" data-pending="单班详情视图已进入预演队列。">单班详情</button>
              <button class="cps-mode-btn" type="button" data-pending="调整建议视图已进入预演队列。">调整建议</button>
            </div>
          </div>
          <div class="cps-main-grid">
            <aside class="cps-catalog" aria-label="单元课时目录">
              <div class="cps-panel-head"><span>单元课时目录</span><span class="quiet-tag">辅助栏</span></div>
              ${view.lesson_catalog.map((unit) => `
                <section class="cps-unit-group">
                  <div class="cps-unit-title">
                    <span class="cps-unit-name"><span class="cps-unit-mark ${html(unit.tone)}"></span>${html(unit.title)}</span>
                    <span class="cps-unit-hours">${html(unit.hours)}</span>
                  </div>
                  <div class="cps-catalog-lessons">
                    ${unit.lessons.map(([code, title]) => `<button class="cps-catalog-lesson" type="button" data-pending="已高亮 ${html(code)} 在各班中的课时落点。"><span class="lesson-code">${html(code)}</span><span>${html(title)}</span></button>`).join("")}
                  </div>
                </section>
              `).join("")}
            </aside>
            <section class="cps-board" aria-label="周次班级排课看板">
              <div class="cps-class-header-row">
                <div class="cps-corner-cell">周次</div>
                ${view.class_headers.map((klass) => `
                  <div class="cps-class-header ${klass.state === "behind" ? "risk" : ""}">
                    <div>
                      <div class="cps-class-name">${html(klass.label)}</div>
                      <div class="cps-class-progress">当前 ${html(klass.current)}</div>
                    </div>
                  </div>
                `).join("")}
              </div>
              ${view.week_axis.map((week) => `
                <div class="cps-week-row ${week.state === "current" ? "current" : ""} ${week.state === "future" ? "future" : ""}">
                  <div class="cps-week-axis">
                    <div>
                      <div class="cps-week-title">${html(week.label)}</div>
                      <div class="cps-week-date">${html(week.date)}</div>
                      ${week.state === "current" ? `<div class="cps-today-mark">当前周</div>` : ""}
                    </div>
                  </div>
                  ${view.class_headers.map((klass) => {
                    const slots = view.class_week_cells[`${week.id}-${klass.id}`] || [["empty", "", "未排课"], ["empty", "", "未排课"]];
                    return `
                      <div class="cps-class-week-cell">
                        <div class="cps-weekly-slot-stack">
                          ${[0, 1].map((slotIndex) => renderClassProgressSlot(slots[slotIndex], week, klass, slotIndex)).join("")}
                        </div>
                      </div>
                    `;
                  }).join("")}
                </div>
              `).join("")}
            </section>
            <aside class="cps-suggestions" aria-label="小教建议">
              <div class="cps-panel-head"><span>小教建议</span><span class="quiet-tag">需教师确认</span></div>
              <div class="cps-suggestion-list">
                ${view.suggestions.map((item, index) => `
                  <div class="cps-suggestion-item">
                    <div><span class="cps-suggestion-index">${index + 1}</span><strong>${html(item.tone === "normal" ? "下节准备" : "排课提醒")}</strong></div>
                    <div class="cps-suggestion-text">${html(item.text)}</div>
                  </div>
                `).join("")}
              </div>
              <div class="chip-row" style="margin-top: 12px;">
                <button class="node-action primary" data-pending="小教已生成调整方案预演，等待教师确认。">${iconButtonLabel("查看调整方案", "arrow")}</button>
                <button class="node-action secondary" data-pending="小教已生成下节课准备推送预演，等待教师确认。">${iconButtonLabel("推送下节准备", "send")}</button>
              </div>
            </aside>
          </div>
        </div>
      `;
    }

    function renderFlexibleSemesterMapCanvas(view) {
      return `
        <div class="semester-plan">
          <aside class="unit-catalog">
            <div class="plan-panel-head">
              <span>单元课时目录</span>
              <span class="quiet-tag">展开全部</span>
            </div>
            <div class="unit-list">
              ${view.plan_units.map((unit) => `
                <section class="unit-group">
                  <div class="unit-group-head">
                    <span class="unit-name"><span class="unit-color-mark ${html(unit.tone)}"></span>${html(unit.title)}</span>
                    <span class="unit-hours">${html(unit.hours)}</span>
                  </div>
                  <div class="lesson-list">
                    ${unit.lessons.map(([code, title]) => `
                      <div class="lesson-line">
                        <span class="lesson-code">${html(code)}</span>
                        <span>${html(title)}</span>
                      </div>
                    `).join("")}
                  </div>
                </section>
              `).join("")}
            </div>
          </aside>
          <section class="week-plan-board">
            <div class="plan-panel-head">
              <span>周次计划（每周 1-2 课时）</span>
              <span class="quiet-tag">教师确认后应用</span>
            </div>
            <div class="week-plan-list">
              ${view.plan_weeks.map((week) => `
                <div class="week-row">
                  <div class="week-label">
                    <div>
                      <div class="week-name">${html(week.week)}</div>
                      <div class="week-date">${html(week.date)}</div>
                    </div>
                  </div>
                  <div class="week-slots">
                    ${week.lessons.map(([code, title, tone]) => `
                      <button class="plan-lesson ${html(tone)}" data-node="${html(`plan-${code}`)}" title="${html(title)}">
                        <span class="lesson-code">${html(code.startsWith("buffer") || code === "final-show" ? "" : code)}</span>
                        <span>${html(title)}</span>
                      </button>
                    `).join("")}
                  </div>
                </div>
              `).join("")}
            </div>
          </section>
        </div>
      `;
    }

    function renderActiveViewMarkup(view) {
      if (view.id === "weekCalendar") return renderWeekCalendarCanvas(view);
      if (view.id === "prepNotebook") return renderPrepNotebookCanvas(view);
      if (view.id === "classProgressSchedule") return renderClassProgressScheduleCanvas(view);
      return renderFlexibleSemesterMapCanvas(view);
    }

    function commitCanvasRender(view) {
      const renderLayer = byId("renderLayer");
      renderLayer.innerHTML = renderActiveViewMarkup(view);
      window.requestAnimationFrame(() => {
        renderLayer.classList.remove("is-entering");
      });
      renderNegotiationPanel();
      renderStatusBar();
      const canvasStage = byId("canvasStage");
      canvasStage.scrollTop = model.view_scroll_positions?.[view.id] || 0;
    }

    function renderPrepRoomCanvas(options = {}) {
      const view = getActiveView();
      renderCanvasHeader(view);
      const renderLayer = byId("renderLayer");
      if (!options.animate) {
        commitCanvasRender(view);
        return;
      }
      renderLayer.classList.add("is-fading");
      window.clearTimeout(model.render_transition_timer);
      model.render_transition_timer = window.setTimeout(() => {
        renderLayer.classList.remove("is-fading");
        renderLayer.classList.add("is-entering");
        commitCanvasRender(view);
      }, 150);
    }

    function toolShortLabel(tool) {
      const map = {
        textbook: "教材",
        unit: "单元",
        split: "拆课",
        weekly: "周历",
        reschedule: "重排",
        flow: "流程",
        worksheet: "学习单",
        search: "检索",
        xiaomei: "小美",
        xiaoping: "小评",
        xiaoguan: "小管"
      };
      return map[tool.id] || tool.title.slice(0, 3);
    }

    function renderToolRail() {
      const rail = byId("toolRail");
      if (!rail) return;
      rail.innerHTML = model.tools.map((tool, index) => `
        ${index === 5 ? `<div class="tool-separator" aria-hidden="true"></div>` : ""}
        <button class="tool-btn" data-tool="${html(tool.id)}" data-label="${html(tool.title)}" title="${html(tool.title)}" aria-label="${html(tool.title)}">
          ${iconButtonLabel(tool.title, iconForTool(tool.id))}
        </button>
      `).join("");
    }

    function placeInspectorNearPointer(inspector, pointerEvent) {
      if (!pointerEvent) return;
      const stage = byId("canvasStage");
      const stageRect = stage.getBoundingClientRect();
      const gap = 14;
      const fallbackWidth = 340;
      const fallbackHeight = 360;
      const width = inspector.offsetWidth || Math.min(fallbackWidth, Math.max(260, stageRect.width - 36));
      const height = inspector.offsetHeight || fallbackHeight;
      const minLeft = 18;
      const minTop = 18;
      const maxLeft = Math.max(minLeft, stage.clientWidth - width - 18);
      const maxTop = Math.max(minTop, stage.clientHeight - height - 18);
      const rawLeft = pointerEvent.clientX - stageRect.left + stage.scrollLeft + gap;
      const rawTop = pointerEvent.clientY - stageRect.top + stage.scrollTop + gap;
      const left = Math.min(Math.max(rawLeft, minLeft), maxLeft);
      const top = Math.min(Math.max(rawTop, minTop), maxTop);
      inspector.style.setProperty("--inspector-left", `${Math.round(left)}px`);
      inspector.style.setProperty("--inspector-top", `${Math.round(top)}px`);
    }

    function openInspector(targetId, options = {}) {
      const inspector = byId("inspector");
      const tool = model.tools.find((item) => item.id === targetId);
      const detail = tool
        ? {
            type: "工具详情",
            title: tool.title,
            fields: [["用途", tool.desc], ["边界", "只生成预演，不触发正式调用"], ["工具ID", tool.id]],
            actions: tool.actions
          }
        : getNodeDetail(targetId);

      if (!detail) {
        inspector.classList.add("hidden");
        return;
      }

      if (!tool) {
        model.selected_node_id = targetId;
      }

      inspector.innerHTML = `
        <div class="inspector-head">
          <div>
            <div class="inspector-kicker">${html(detail.type)}</div>
            <div class="inspector-title">${html(detail.title)}</div>
          </div>
          <button class="icon-close" id="closeInspectorBtn" aria-label="关闭检查器">×</button>
        </div>
        <div class="inspector-body">
          <div class="field-grid">
            ${detail.fields.map(([label, value]) => `
              <div class="field-row">
                <div class="field-label">${html(label)}</div>
                <div class="field-value">${html(value)}</div>
              </div>
            `).join("")}
          </div>
          <div>
            <div class="section-title"><span>可预演动作</span><span class="quiet-tag">需教师确认</span></div>
            <div class="inspector-actions">
              ${detail.actions.map((action) => `<button class="node-action icon-only inspector-action" title="${html(action)}" aria-label="${html(action)}" data-pending="小教已生成「${html(action)}」预演，等待教师确认。">${iconButtonLabel(action, iconForAction(action))}</button>`).join("")}
            </div>
          </div>
          <div class="pending-panel" id="inspectorPending">
            ${html(model.pending_changes[0]?.text || "暂无待确认预演。")}
          </div>
        </div>
      `;
      inspector.classList.remove("hidden");
      placeInspectorNearPointer(inspector, options.event);

      document.querySelectorAll(".canvas-node").forEach((node) => {
        node.classList.toggle("selected", node.dataset.node === model.selected_node_id);
      });
      document.querySelectorAll(".tool-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.tool === targetId);
      });

      if (!options.silent) {
        showToast(tool ? `已打开工具：${detail.title}` : `已选中：${detail.title}`);
      }
    }

    function addPendingChange(text, source = "画布预演") {
      const item = {
        id: `pending-${Date.now()}`,
        text,
        source,
        applied: false
      };
      model.pending_changes.unshift(item);
      renderStatusBar();
      const pending = byId("inspectorPending");
      if (pending) pending.textContent = item.text;
      showToast(text);
    }

    function renderFlowSteps() {
      return `
        <div class="flow-steps" aria-label="课包流转步骤">
          ${model.flow_steps.map((step, index) => `
            <span class="flow-step ${step.current ? "current" : ""}">
              <span class="flow-dot" aria-hidden="true"></span>
              <span>${html(step.label)}</span>
            </span>
            ${index < model.flow_steps.length - 1 ? `<span class="flow-sep" aria-hidden="true">›</span>` : ""}
          `).join("")}
        </div>
      `;
    }

    function renderStatusBar() {
      const latest = model.pending_changes[0];
      byId("statusMain").innerHTML = `
        ${renderFlowSteps()}
        <span class="status-text">${html(latest ? latest.text : "暂无待确认预演。")}</span>
      `;
      byId("statusCount").textContent = `${model.pending_changes.length} 项`;
    }

    let toastTimer = null;
    function showToast(text) {
      const toast = byId("toast");
      toast.textContent = text;
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function selectView(viewId) {
      const canvasStage = byId("canvasStage");
      model.view_scroll_positions[model.active_view] = canvasStage.scrollTop;
      model.active_view = viewId;
      const view = getActiveView();
      const firstPlanLesson = view.plan_weeks?.[0]?.lessons?.[0]?.[0];
      const firstCpsWeek = view.week_axis?.[0]?.id;
      const firstCpsClass = view.class_headers?.[0]?.id;
      const firstCpsNode = firstCpsWeek && firstCpsClass ? `cps-${firstCpsWeek}-${firstCpsClass}-1` : "";
      const firstWcNode = Object.values(view.slots || {}).flat()[0]?.id || "";
      const firstNode = view.active_node || firstWcNode || view.nodes?.[0]?.id || view.weeks?.[0]?.id || firstCpsNode || (firstPlanLesson ? `plan-${firstPlanLesson}` : "") || view.lanes?.[0]?.blocks?.[0]?.id;
      model.selected_node_id = firstNode || model.selected_node_id;
      byId("inspector").classList.add("hidden");
      renderPrepRoomCanvas({ animate: true });
      showToast(`已切换到${view.label}画布`);
    }

    function bindEvents() {
      document.body.addEventListener("click", (event) => {
        const viewButton = event.target.closest("[data-view]");
        if (viewButton) {
          selectView(viewButton.dataset.view);
          return;
        }

        const spaceButton = event.target.closest(".space-btn");
        if (spaceButton) {
          event.preventDefault();
          showToast(`进入${spaceButton.getAttribute("aria-label") || "学校空间"}仍为预览入口`);
          return;
        }

        const chatFill = event.target.closest("[data-chat-fill]");
        if (chatFill) {
          const input = byId("chatInput");
          input.value = chatFill.dataset.chatFill;
          input.focus();
          return;
        }

        if (event.target.closest("#chatUploadBtn")) {
          byId("chatUploadInput").click();
          return;
        }

        if (event.target.closest("#chatVoiceBtn")) {
          addPendingChange("小备已打开语音意图入口预演，等待教师继续输入。", "小备意图入口");
          return;
        }

        if (event.target.closest("#chatSendBtn")) {
          submitChatMessage();
          return;
        }

        const pendingSource = event.target.closest("[data-pending]");
        if (pendingSource) {
          addPendingChange(pendingSource.dataset.pending);
          return;
        }

        const node = event.target.closest("[data-node]");
        if (node) {
          openInspector(node.dataset.node, { event });
          return;
        }

        const tool = event.target.closest("[data-tool]");
        if (tool) {
          openInspector(tool.dataset.tool, { event });
          return;
        }

        const intent = event.target.closest("[data-intent]");
        if (intent) {
          const input = byId("chatInput");
          input.value = input.value ? `${input.value}\n${intent.dataset.intent}` : intent.dataset.intent;
          input.focus();
          return;
        }

        const current = event.target.closest("[data-action='open-current']");
        if (current) {
          openInspector(model.selected_node_id, { event });
          return;
        }

        if (event.target.id === "closeInspectorBtn") {
          byId("inspector").classList.add("hidden");
        }
      });

      byId("chatInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          submitChatMessage();
        }
      });

      byId("chatUploadInput").addEventListener("change", (event) => {
        const files = Array.from(event.target.files || []);
        if (!files.length) return;
        const names = files.slice(0, 3).map((file) => file.name).join("、");
        const more = files.length > 3 ? ` 等${files.length}个文件` : "";
        addPendingChange(`小备已接收资料「${names}${more}」的本地挂载预演，未上传到服务器。`, "资料入口");
        event.target.value = "";
      });

      document.body.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const node = event.target.closest("[data-node]");
        if (node) {
          event.preventDefault();
          openInspector(node.dataset.node);
        }
      });
    }

    function submitChatMessage() {
      const input = byId("chatInput");
      const text = input.value.trim();
      if (!text) {
        showToast("先对小备说一句");
        input.focus();
        return;
      }
      model.negotiation.input_value = text;
      addPendingChange(`小备已收到意图：「${text}」，正在生成影响范围预演。`, "小备意图入口");
      input.value = "";
    }

    function initPrepRoomRenderCanvas() {
      hydrateShellIcons();
      renderToolRail();
      renderNegotiationPanel();
      renderPrepRoomCanvas();
      bindEvents();
    }

    window.renderWeekCalendarCanvas = renderWeekCalendarCanvas;
    window.renderPrepNotebookCanvas = renderPrepNotebookCanvas;
    window.renderClassProgressScheduleCanvas = renderClassProgressScheduleCanvas;
    window.renderFlexibleSemesterMapCanvas = renderFlexibleSemesterMapCanvas;
    window.renderToolRail = renderToolRail;
    window.openInspector = openInspector;
    window.addPendingChange = addPendingChange;
    window.renderPrepRoomCanvas = renderPrepRoomCanvas;

    initPrepRoomRenderCanvas();
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>师维 · 备课室 | 渲染画布深化 V1</title>
  <style>
    :root {
      --bg: #f5f7f7;
      --panel: #ffffff;
      --panel-soft: #f8fbfa;
      --ink: #1d2723;
      --muted: #66736e;
      --line: #d8e0dc;
      --line-strong: #becbc5;
      --green: #2f7668;
      --green-soft: #e5f2ee;
      --blue: #315f90;
      --blue-soft: #e8f0f8;
      --amber: #ac6a1c;
      --amber-soft: #f7eee2;
      --red: #b34d43;
      --red-soft: #f7e9e7;
      --shadow: 0 18px 48px rgba(29, 39, 35, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(180deg, #ffffff 0, var(--bg) 72px, var(--bg) 100%);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
      border-radius: 999px;
    }

    .icon {
      width: 18px;
      height: 18px;
      display: inline-block;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .icon.sm {
      width: 16px;
      height: 16px;
    }

    .icon.lg {
      width: 20px;
      height: 20px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .topbar {
      min-height: 72px;
      display: grid;
      grid-template-columns: minmax(190px, 0.9fr) minmax(360px, 1.4fr) minmax(260px, 0.9fr);
      align-items: center;
      gap: 18px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
    }

    .logo-area {
      display: flex;
      align-items: baseline;
      gap: 7px;
      min-width: 0;
    }

    .logo-mark {
      font-size: 25px;
      color: var(--green);
      font-weight: 900;
      line-height: 1;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 850;
      line-height: 1;
      color: #244c42;
      white-space: nowrap;
    }

    .logo-sub {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .space-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .space-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      text-decoration: none;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    .space-btn:hover {
      transform: translateY(-1px);
      background: var(--green-soft);
      border-color: #b9d9cf;
    }

    .space-btn.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
      box-shadow: 0 8px 18px rgba(47, 118, 104, 0.16);
    }

    .nav-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
    }

    .search-box {
      min-width: 0;
      max-width: 230px;
      height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
    }

    .search-box input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
    }

    .search-box .icon {
      color: var(--green);
      opacity: 0.75;
    }

    .nav-icon,
    .user-avatar {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--green);
      position: relative;
    }

    .nav-icon .icon,
    .user-avatar .icon,
    .space-btn .icon {
      width: 19px;
      height: 19px;
    }

    .nav-badge {
      position: absolute;
      top: -3px;
      right: -4px;
      min-width: 16px;
      height: 16px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #d46a4c;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
    }

    .context-bar {
      min-height: 54px;
      display: grid;
      grid-template-columns: minmax(360px, 1fr) auto minmax(160px, 1fr);
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfdfb;
    }

    .context-title {
      min-width: 0;
      justify-self: center;
      padding: 0 10px;
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      font-size: 26px;
      line-height: 1.1;
      font-weight: 950;
      color: var(--green);
      text-shadow: 0 10px 24px rgba(47, 118, 104, 0.18);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .context-space-name {
      color: transparent;
      background: linear-gradient(135deg, #1f6f61 0%, #2f7668 42%, #315f90 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .context-view-name {
      font-size: 0.72em;
      font-weight: 850;
      opacity: 0.82;
      color: #2f7668;
      text-shadow: none;
    }

    .context-meta {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .context-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid #cfe0d9;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      max-width: 100%;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill.strong {
      color: var(--green);
      border-color: #b9d9cf;
      background: var(--green-soft);
      font-weight: 700;
    }

    .workspace {
      height: calc(100vh - 72px - 54px - 78px - 42px);
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
      overflow: hidden;
    }

    .intent-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: #fbfdfc;
      overflow: hidden;
    }

    .panel-scroll {
      min-height: 0;
      overflow: auto;
      padding: 16px;
    }

    .assistant-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .assistant-avatar {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .assistant-name {
      font-weight: 800;
    }

    .assistant-role {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
      line-height: 1.5;
    }

    .section {
      margin-top: 14px;
      padding: 14px 0 0;
      border-top: 1px solid var(--line);
    }

    .section:first-of-type {
      border-top: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      font-weight: 800;
      font-size: 13px;
    }

    .section-caption {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .intent-input {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      padding: 10px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      outline: none;
      line-height: 1.7;
    }

    .intent-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 118, 104, 0.12);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .intent-chip,
    .text-button,
    .primary-button,
    .ghost-button {
      min-height: 32px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 0 14px;
    }

    .intent-chip {
      color: var(--muted);
      font-size: 12px;
    }

    .intent-chip:hover,
    .text-button:hover,
    .ghost-button:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-soft);
    }

    .primary-button {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
      font-weight: 700;
    }

    .primary-button:hover {
      background: #255f54;
    }

    .ghost-button {
      color: var(--green);
      border-color: #b9d9cf;
      background: var(--green-soft);
      font-weight: 700;
    }

    .result-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .result-list li {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      line-height: 1.65;
    }

    .agent-note {
      padding: 12px;
      border-left: 3px solid var(--green);
      background: var(--green-soft);
      border-radius: 0 var(--radius) var(--radius) 0;
      line-height: 1.7;
      color: #24453e;
    }

    .prep-render-canvas {
      position: relative;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(216, 224, 220, 0.45) 1px, transparent 1px),
        linear-gradient(0deg, rgba(216, 224, 220, 0.45) 1px, transparent 1px),
        #f9fbfa;
      background-size: 28px 28px;
    }

    .view-tabs {
      justify-self: end;
      display: inline-grid;
      grid-template-columns: repeat(4, 42px);
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
    }

    .view-tab {
      width: 42px;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      white-space: nowrap;
    }

    .view-tab.active {
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .ai-tool-strip {
      min-height: 56px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(12px);
    }

    .ai-tool-label {
      min-width: 34px;
      min-height: 34px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid #b9d9cf;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
    }

    .canvas-stage {
      position: relative;
      min-height: 0;
      flex: 1;
      overflow: auto;
      padding: 18px;
    }

    .render-layer {
      min-width: 780px;
      min-height: 100%;
      position: relative;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .render-layer.is-fading {
      opacity: 0;
      transform: translateY(8px);
    }

    .render-layer.is-entering {
      opacity: 0;
      transform: translateY(8px);
    }

    .canvas-band {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 34px rgba(29, 39, 35, 0.08);
    }

    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .metric {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
    }

    .metric-value {
      font-size: 22px;
      font-weight: 850;
      color: var(--ink);
    }

    .metric.week-metric {
      display: flex;
      align-items: center;
      gap: 12px;
      border-color: #abd5ca;
      background: linear-gradient(135deg, #e8f5f1, #ffffff);
    }

    .metric.week-metric .metric-value {
      min-width: 76px;
      min-height: 54px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 25px;
      box-shadow: 0 10px 22px rgba(47, 118, 104, 0.18);
    }

    .metric.week-metric .metric-label {
      margin-top: 0;
      font-weight: 800;
      color: var(--green);
    }

    .metric-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .week-board {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .canvas-node {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      transition: border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
      outline: none;
    }

    .canvas-node:hover,
    .canvas-node:focus {
      border-color: var(--green);
      box-shadow: 0 12px 24px rgba(47, 118, 104, 0.12);
      transform: translateY(-1px);
    }

    .canvas-node.selected {
      border-color: var(--green);
      box-shadow: inset 0 0 0 2px rgba(47, 118, 104, 0.2), 0 14px 30px rgba(47, 118, 104, 0.14);
    }

    .week-card {
      min-height: 230px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .wc-scene {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }

    .wc-control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .wc-control-cluster,
    .wc-mode-switcher,
    .wc-legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .wc-chip {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .wc-chip.active {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
      box-shadow: 0 8px 18px rgba(47, 118, 104, 0.14);
    }

    .wc-chip.week {
      color: var(--green);
      border-color: #b9d9cf;
      background: var(--green-soft);
    }

    .wc-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .wc-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      flex: 0 0 auto;
    }

    .wc-dot.today { background: #1e6f60; }
    .wc-dot.warning,
    .wc-dot.activity { background: var(--amber); }
    .wc-dot.reschedule { background: var(--blue); }
    .wc-dot.holiday { background: #c76d66; }
    .wc-dot.makeup { background: #7565d4; }
    .wc-dot.future { background: #8c9894; }

    .wc-main-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(230px, 0.28fr);
      gap: 12px;
      overflow: auto;
    }

    .wc-calendar-board,
    .wc-side-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.93);
      box-shadow: 0 12px 30px rgba(29, 39, 35, 0.05);
    }

    .wc-calendar-board {
      min-width: 0;
      overflow: auto;
    }

    .wc-header-row,
    .wc-period-row {
      display: grid;
      grid-template-columns: minmax(64px, 0.5fr) repeat(7, minmax(112px, 1fr));
      width: 100%;
      min-width: 980px;
    }

    .wc-header-row {
      position: sticky;
      top: 0;
      z-index: 3;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
    }

    .wc-corner,
    .wc-day-head,
    .wc-period-label,
    .wc-cell {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .wc-corner,
    .wc-day-head,
    .wc-period-label {
      min-height: 54px;
      display: grid;
      place-items: center;
      padding: 8px;
      text-align: center;
      font-weight: 900;
    }

    .wc-day-date {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .wc-day-head.today {
      color: var(--green);
      background: linear-gradient(135deg, rgba(224, 243, 237, 0.98), rgba(255, 255, 255, 0.96));
      box-shadow: inset 0 -3px 0 var(--green);
    }

    .wc-day-head.workday {
      color: #6857c8;
      background: #f5f2ff;
    }

    .wc-day-head.weekend {
      color: var(--muted);
      background: #f6f8f7;
    }

    .wc-period-label {
      position: sticky;
      left: 0;
      z-index: 2;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
    }

    .wc-cell {
      min-height: 74px;
      display: grid;
      align-items: center;
      justify-items: center;
      padding: 8px;
      background: rgba(255, 255, 255, 0.62);
    }

    .wc-cell.today {
      background: rgba(224, 243, 237, 0.36);
    }

    .wc-cell.future,
    .wc-cell.weekend {
      background: rgba(243, 246, 245, 0.64);
    }

    .wc-empty {
      width: 28px;
      height: 1px;
      background: #dfe7e4;
    }

    .wc-course-card {
      width: min(100%, 150px);
      display: grid;
      gap: 3px;
      justify-items: center;
      padding: 8px 9px;
      border: 1px solid #b9d9cf;
      border-radius: 8px;
      background: linear-gradient(135deg, #edf8f5, #fff);
      color: #244c42;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .wc-course-class {
      font-size: 13px;
      font-weight: 930;
    }

    .wc-course-title {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .wc-course-status {
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
    }

    .wc-course-card.today { border-color: var(--green); box-shadow: inset 4px 0 0 var(--green); }
    .wc-course-card.warning { border-color: #efc49c; background: var(--amber-soft); color: var(--amber); }
    .wc-course-card.activity { border-color: #efc49c; background: var(--amber-soft); color: var(--amber); }
    .wc-course-card.reschedule { border-color: #abc4f1; background: var(--blue-soft); color: var(--blue); }
    .wc-course-card.holiday { border-color: #f1b7b1; background: var(--red-soft); color: var(--red); }
    .wc-course-card.makeup { border-color: #c8c0f4; background: #f0edff; color: #6857c8; }
    .wc-course-card.future { border-color: #d3dbd8; background: #f3f5f4; color: #4e5a56; }
    .wc-course-card.done { border-color: #c8e2d8; background: #f1faf6; color: var(--green); }

    .wc-side-panel {
      padding: 12px;
      overflow: auto;
    }

    .wc-side-section + .wc-side-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .wc-side-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 930;
    }

    .wc-side-list {
      display: grid;
      gap: 8px;
      margin-top: 9px;
    }

    .wc-side-item {
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      line-height: 1.5;
      color: var(--muted);
      font-size: 12px;
    }

    .wc-side-item strong {
      display: block;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .wc-summary-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 9px;
    }

    .wc-summary-cell {
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .wc-summary-cell strong {
      display: block;
      font-size: 16px;
      color: var(--green);
    }

    .nb-scene {
      display: grid;
      grid-template-columns: minmax(260px, 0.28fr) minmax(520px, 1fr) minmax(280px, 0.34fr);
      gap: 14px;
      align-items: stretch;
    }

    .nb-panel,
    .nb-workspace,
    .nb-drawer {
      min-height: 560px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 28px rgba(29, 39, 35, 0.045);
    }

    .nb-panel,
    .nb-drawer {
      padding: 14px;
      overflow: hidden;
    }

    .nb-workspace {
      padding: 16px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .nb-panel-head,
    .nb-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
    }

    .nb-cover {
      margin-top: 12px;
      padding: 14px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(224, 243, 237, 0.95), rgba(255, 255, 255, 0.9));
      border: 1px solid #c5e2d8;
    }

    .nb-cover-title {
      font-size: 18px;
      font-weight: 930;
      color: var(--green);
    }

    .nb-cover-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .nb-metrics {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(47, 118, 104, 0.12);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .nb-metric {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #61716b;
      font-size: 12px;
      white-space: nowrap;
    }

    .nb-metric-light {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      flex: 0 0 auto;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 118, 104, 0.1);
    }

    .nb-metric.warn .nb-metric-light {
      background: var(--amber);
      box-shadow: 0 0 0 3px rgba(181, 115, 28, 0.12);
    }

    .nb-metric.missing .nb-metric-light {
      background: var(--red);
      box-shadow: 0 0 0 3px rgba(199, 78, 70, 0.12);
    }

    .nb-metric strong {
      color: var(--ink);
      font-size: 15px;
      line-height: 1;
    }

    .nb-tree {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .nb-tree-group {
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .nb-tree-group:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .nb-tree-title {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-weight: 900;
    }

    .nb-tree-mark {
      width: 7px;
      height: 18px;
      border-radius: 999px;
      background: var(--green);
      flex: 0 0 auto;
    }

    .nb-tree-mark.blue { background: var(--blue); }
    .nb-tree-mark.amber { background: var(--amber); }
    .nb-tree-mark.red { background: var(--red); }

    .nb-tree-items {
      display: grid;
      gap: 6px;
      padding-left: 15px;
      border-left: 1px solid var(--line);
      margin-left: 3px;
    }

    .nb-tree-button {
      width: 100%;
      min-height: 32px;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      padding: 0 8px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      text-align: left;
      font-size: 13px;
    }

    .nb-tree-button.active,
    .nb-tree-button:hover {
      border-color: #c5e2d8;
      background: var(--green-soft);
      color: var(--green);
      font-weight: 850;
    }

    .nb-node-code {
      color: var(--green);
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .nb-node-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nb-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
    }

    .nb-status-dot.warn { background: var(--amber); }
    .nb-status-dot.draft { background: var(--blue); }
    .nb-status-dot.missing { background: var(--red); }
    .nb-status-dot.done { background: var(--green); }

    .nb-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid #c5e2d8;
      border-radius: 8px;
      background: linear-gradient(135deg, #f0faf6 0%, #ffffff 58%, #f5f9ff 100%);
    }

    .nb-kicker {
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
    }

    .nb-title {
      margin-top: 5px;
      font-size: 24px;
      font-weight: 950;
      color: var(--ink);
    }

    .nb-subtitle {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
    }

    .nb-hero-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nb-status-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(88px, 1fr));
      gap: 10px;
    }

    .nb-status-card {
      min-height: 78px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.84);
      display: grid;
      align-content: center;
      gap: 4px;
    }

    .nb-status-card strong {
      color: var(--green);
      font-size: 22px;
      line-height: 1;
    }

    .nb-status-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .nb-work-sections {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .nb-work-card {
      min-height: 114px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
    }

    .nb-work-card.warn {
      border-color: #efc49c;
      background: var(--amber-soft);
    }

    .nb-work-card.missing {
      border-color: #f1b7b1;
      background: var(--red-soft);
    }

    .nb-work-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-weight: 900;
    }

    .nb-work-note {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .nb-main-canvas {
      display: grid;
      gap: 12px;
    }

    .nb-mode-strip,
    .nb-quality-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nb-mode-pill,
    .nb-quality-pill {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--muted);
      font-size: 12px;
      font-weight: 820;
      white-space: nowrap;
    }

    .nb-mode-pill {
      font: inherit;
      cursor: pointer;
    }

    .nb-mode-pill.active,
    .nb-quality-pill.ready {
      border-color: #b9d9cf;
      background: var(--green-soft);
      color: var(--green);
    }

    .nb-quality-pill.pending {
      border-color: #efc49c;
      background: var(--amber-soft);
      color: var(--amber);
    }

    .nb-reasoning-brief {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid rgba(111, 128, 112, 0.18);
      border-radius: var(--radius-small);
      background: rgba(247, 250, 246, 0.78);
    }

    .nb-reasoning-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .nb-reasoning-item {
      display: grid;
      gap: 4px;
      min-width: 0;
      padding: 8px 0;
      border-top: 1px solid rgba(111, 128, 112, 0.12);
      line-height: 1.55;
    }

    .nb-reasoning-item strong {
      color: var(--green);
      font-size: 12px;
    }

    .nb-binding-card {
      border: 1px solid rgba(111, 78, 55, 0.16);
      background: linear-gradient(180deg, rgba(255, 253, 248, 0.96), rgba(247, 241, 230, 0.72));
      border-radius: var(--radius-small);
      padding: 14px;
      margin: 14px 0;
      box-shadow: 0 12px 28px rgba(90, 67, 44, 0.08);
    }

    .nb-binding-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .nb-binding-title {
      display: grid;
      gap: 4px;
      font-weight: 800;
      color: var(--ink);
    }

    .nb-binding-title span {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .nb-binding-quote {
      padding: 10px 12px;
      border-left: 3px solid var(--green);
      background: rgba(71, 146, 105, 0.08);
      border-radius: 6px;
      color: var(--ink);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .nb-binding-grid,
    .nb-impact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .nb-binding-mini,
    .nb-impact-item,
    .nb-response-item {
      border: 1px solid rgba(111, 78, 55, 0.1);
      background: rgba(255,255,255,0.68);
      border-radius: var(--radius-small);
      padding: 9px;
      line-height: 1.55;
    }

    .nb-binding-mini strong,
    .nb-impact-item strong,
    .nb-response-item strong {
      display: block;
      color: var(--ink);
      margin-bottom: 3px;
    }

    .nb-event-list,
    .nb-response-grid {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .nb-event-card {
      border: 1px solid rgba(111, 78, 55, 0.12);
      background: rgba(255,255,255,0.72);
      border-radius: var(--radius-small);
      padding: 10px;
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    .nb-event-card.active {
      border-color: rgba(213, 151, 72, 0.5);
      background: rgba(255, 247, 230, 0.92);
    }

    .nb-event-name {
      display: grid;
      gap: 4px;
      font-weight: 800;
      color: var(--ink);
    }

    .nb-event-name span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .nb-event-copy {
      display: grid;
      gap: 4px;
      line-height: 1.6;
      color: var(--muted);
    }

    .nb-event-copy strong {
      color: var(--ink);
      font-weight: 700;
    }

    .nb-patch-card {
      border: 1px solid rgba(213, 151, 72, 0.38);
      background: rgba(255, 247, 230, 0.9);
      border-radius: var(--radius-small);
      padding: 12px;
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .nb-patch-row {
      display: grid;
      gap: 3px;
      line-height: 1.6;
    }

    .nb-patch-row strong {
      color: var(--ink);
    }

    .nb-trace-card {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(69, 128, 104, 0.22);
      border-radius: var(--radius-small);
      background: linear-gradient(180deg, rgba(247, 250, 246, 0.96), rgba(255, 252, 247, 0.92));
    }

    .nb-trace-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .nb-trace-title {
      display: grid;
      gap: 4px;
      line-height: 1.45;
    }

    .nb-trace-title strong {
      color: var(--ink);
      font-size: 14px;
    }

    .nb-trace-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .nb-trace-list {
      display: grid;
      gap: 8px;
    }

    .nb-trace-step {
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      color: #47514c;
      line-height: 1.55;
    }

    .nb-trace-dot {
      width: 14px;
      height: 14px;
      margin-top: 4px;
      border-radius: 999px;
      border: 2px solid #c9d7cf;
      background: #fff;
    }

    .nb-trace-step.done .nb-trace-dot {
      border-color: var(--green);
      background: var(--green);
    }

    .nb-trace-step.current .nb-trace-dot {
      border-color: var(--amber);
      background: var(--amber-soft);
      box-shadow: 0 0 0 5px rgba(192, 122, 49, 0.12);
      animation: tracePulse 1.2s ease-in-out infinite;
    }

    .nb-trace-copy {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .nb-trace-copy strong {
      font-size: 12px;
      color: var(--ink);
    }

    .nb-trace-copy span {
      color: var(--muted);
      font-size: 12px;
    }

    .nb-trace-step.done .nb-trace-copy span,
    .nb-trace-step.current .nb-trace-copy span {
      color: #34423d;
    }

    .nb-trace-result {
      padding: 9px 10px;
      border-radius: 8px;
      background: rgba(69, 128, 104, 0.1);
      color: var(--green);
      font-size: 13px;
      font-weight: 820;
      line-height: 1.55;
    }

    @keyframes tracePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .nb-field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .nb-field-block {
      min-height: 156px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      display: grid;
      gap: 10px;
      align-content: start;
      cursor: pointer;
    }

    .nb-field-block.candidate {
      border-color: #efc49c;
      background: linear-gradient(135deg, rgba(255, 248, 237, 0.98), rgba(255, 255, 255, 0.9));
    }

    .nb-field-block.confirmed {
      border-color: #b9d9cf;
      background: linear-gradient(135deg, rgba(237, 248, 245, 0.98), rgba(255, 255, 255, 0.9));
    }

    .nb-field-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 930;
    }

    .nb-field-body {
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .nb-source-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .nb-source-chip {
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.76);
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .nb-candidate-list {
      display: grid;
      gap: 8px;
    }

    .nb-candidate-item {
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid #efc49c;
      background: var(--amber-soft);
      color: #5f4620;
      font-size: 13px;
      line-height: 1.5;
    }

    .nb-state-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 10px 0 4px;
      border-bottom: 1px dashed rgba(111, 128, 112, 0.22);
    }

    .nb-mode-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
    }

    .nb-mode-btn {
      min-height: 30px;
      padding: 0 12px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      font-weight: 860;
      cursor: pointer;
    }

    .nb-mode-btn.active {
      background: var(--green);
      color: #fff;
    }

    .nb-doc {
      display: grid;
      gap: 12px;
    }

    .nb-doc-section {
      padding: 14px 0 12px;
      border-bottom: 1px solid rgba(111, 128, 112, 0.16);
      scroll-margin-top: 90px;
    }

    .nb-doc-section.edit-focus {
      margin-left: -12px;
      margin-right: -12px;
      padding: 14px 12px 12px;
      border: 1px solid #efc49c;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255, 248, 237, 0.96), rgba(255, 255, 251, 0.94));
    }

    .nb-doc-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .nb-doc-title {
      font-size: 17px;
      font-weight: 940;
      color: var(--ink);
    }

    .nb-doc-body {
      display: grid;
      gap: 8px;
      color: #2f3936;
      line-height: 1.72;
      font-size: 14px;
    }

    .nb-doc-body p {
      margin: 0;
    }

    .nb-section-tags,
    .nb-step-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .nb-section-tag {
      min-height: 23px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .nb-section-candidate,
    .nb-step-candidate {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #efc49c;
      border-radius: 8px;
      background: var(--amber-soft);
      color: #5f4620;
      line-height: 1.55;
      font-size: 13px;
    }

    .nb-process-list {
      display: grid;
      gap: 10px;
    }

    .nb-process-step {
      padding: 12px;
      border: 1px solid rgba(197, 207, 194, 0.72);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
    }

    .nb-process-step.edit-focus {
      border-color: #efc49c;
      background: linear-gradient(135deg, rgba(255, 248, 237, 0.98), rgba(255, 255, 251, 0.92));
      box-shadow: inset 4px 0 0 var(--amber);
    }

    .nb-step-main {
      display: grid;
      grid-template-columns: minmax(92px, 0.22fr) minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .nb-step-index {
      display: grid;
      gap: 3px;
      color: var(--green);
      font-weight: 930;
    }

    .nb-step-index span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 780;
    }

    .nb-step-summary {
      color: #2f3936;
      line-height: 1.65;
      font-size: 14px;
    }

    .nb-intent-panel {
      margin-top: 10px;
      padding: 12px;
      border: 1px dashed #c9d6d1;
      border-radius: 8px;
      background: rgba(248, 251, 249, 0.86);
    }

    .nb-intent-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .nb-intent-item {
      min-height: 78px;
      padding: 10px;
      border: 1px solid rgba(197, 207, 194, 0.72);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.84);
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .nb-intent-item strong {
      display: block;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .nb-edit-panel {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid #efc49c;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255, 248, 237, 0.96), rgba(255, 255, 251, 0.92));
    }

    .nb-edit-panel-title {
      display: flex;
      align-items: center;

      left: 330px;

      z-index: 3;

    .nb-scene::after {
      content: "";
      position: absolute;
      top: 92px;
      bottom: 116px;
      left: 327px;
      width: 34px;
      background:
        radial-gradient(ellipse at center, rgba(255, 255, 255, 0.92) 0 33%, rgba(113, 121, 111, 0.45) 34% 45%, transparent 47%) center 0 / 34px 130px repeat-y;

    .nb-panel,

      border-color: rgba(197, 207, 194, 0.88);
      box-shadow: 0 18px 36px rgba(55, 66, 52, 0.12);

      content: "";
      position: absolute;
      top: 88px;
      right: -9px;
      width: 18px;
      height: calc(100% - 150px);
      background:
        radial-gradient(ellipse at center, rgba(255,255,255,0.96) 0 32%, rgba(104,111,102,0.5) 33% 43%, transparent 46%) center 0 / 18px 130px repeat-y;
      pointer-events: none;
      z-index: 5;

    .nb-workspace {
      position: relative;

        linear-gradient(90deg, rgba(220, 229, 216, 0.42) 0 1px, transparent 1px) 44px 0 / 100% 100% no-repeat,
        linear-gradient(135deg, rgba(255, 255, 252, 0.98), rgba(251, 249, 241, 0.94));
      border-left-color: rgba(157, 169, 157, 0.75);
    }

    .nb-workspace::before {
      content: "";
      position: absolute;
      top: -1px;
      left: 34px;
      width: 34px;
      height: 60px;
      border-radius: 0 0 8px 8px;
      background: linear-gradient(135deg, #6a9279, #3f6d5a);
      box-shadow: 0 6px 12px rgba(38, 58, 44, 0.22);

    .nb-drawer {
      padding: 20px 14px;

    .nb-hero {

      z-index: -1;

    .nb-title {
      font-size: 30px;
      letter-spacing: 0;

    .nb-status-card,

    }

    .nb-flow-step.current {
      background: rgba(222, 239, 226, 0.94);

    .nb-scene {

      padding: 0;
      border-radius: 0;
      background: transparent;

      min-width: 0;

    .nb-scene::before,

    .nb-panel::after {

    }

    .nb-gutter {
      min-height: 560px;

      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.18) 0 1px, transparent 1px 8px),
        linear-gradient(90deg, #47695d 0%, #91b3a4 42%, #cfe0d6 50%, #7fa091 64%, #3f6155 100%);
      box-shadow: inset 8px 0 18px rgba(14, 48, 38, 0.24), inset -8px 0 18px rgba(14, 48, 38, 0.22);
      border-top: 1px solid rgba(232, 249, 239, 0.22);
      border-bottom: 1px solid rgba(12, 45, 35, 0.22);
      z-index: 2;
    }

      content: "";
      position: absolute;
      inset: 0 17px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.04));
      opacity: 0.75;
    }

    .nb-panel,
    .nb-workspace,
    .nb-drawer {
      border-color: rgba(218, 215, 202, 0.82);
      background:
        linear-gradient(135deg, rgba(255, 255, 250, 0.97), rgba(247, 244, 235, 0.94)),

      box-shadow: 0 14px 32px rgba(23, 30, 25, 0.18);
    }

    .nb-panel {
      margin-right: 0;
      border-radius: 12px 0 0 12px;
      border-right: 0;
    }

    .nb-workspace {
      margin-left: 0;
      padding-left: 34px;
      border-radius: 0 12px 12px 0;
      border-left: 0;
      background:
        linear-gradient(90deg, rgba(222, 216, 204, 0.42) 0 1px, transparent 1px) 30px 0 / 100% 100% no-repeat,
        linear-gradient(135deg, rgba(255, 255, 251, 0.98), rgba(249, 246, 237, 0.94));

    .nb-workspace::before {
      display: none;

    .nb-drawer {
      border-radius: 12px;

    .node-top {

      gap: 10px;

      color: var(--green);

      padding: 0 9px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .cps-class-week-cell {
      min-height: 96px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.66);
    }

    .cps-weekly-slot-stack {
      display: grid;
      grid-template-rows: repeat(2, 1fr);
      gap: 6px;
      height: 100%;
      min-height: 80px;
    }

    .cps-schedule-slot {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cps-slot-card {
      min-width: 0;
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 9px;
      border: 1px solid #b9d9cf;
      border-radius: 7px;
      background: linear-gradient(135deg, #edf8f5, #fff);
      color: #244c42;
      font-size: 13px;
      font-weight: 780;
      text-align: center;
      overflow: hidden;
    }

    .cps-slot-card .lesson-code {
      flex: 0 0 auto;
      min-width: 32px;
      white-space: nowrap;
    }

    .cps-slot-card span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cps-slot-card.activity { border-color: #efc49c; background: var(--amber-soft); color: var(--amber); }
    .cps-slot-card.holiday { border-color: #f1b7b1; background: var(--red-soft); color: var(--red); }
    .cps-slot-card.reschedule { border-color: #abc4f1; background: var(--blue-soft); color: var(--blue); }
    .cps-slot-card.delay,
    .cps-slot-card.makeup { border-color: #c8c0f4; background: #f0edff; color: #6857c8; }
    .cps-slot-card.future { border-color: #d3dbd8; background: #f3f5f4; color: #68736f; }
    .cps-slot-card.empty { border-style: dashed; background: #fbfcfc; color: #9ba6a2; font-weight: 650; }

    .cps-week-row.future .cps-slot-card {
      color: #4e5a56;
    }


    .cps-suggestion-list {
      display: grid;
      gap: 10px;
    }

    .cps-suggestion-item {
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
    }

    .cps-suggestion-index {
      width: 20px;
      height: 20px;
      display: inline-grid;
      place-items: center;
      margin-right: 6px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
    }

    .cps-suggestion-text {
      margin-top: 7px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }

    .side-stack {
      display: grid;
      gap: 12px;
    }

    .insight-panel {
      padding: 14px;
    }

    .insight-title {
      font-weight: 850;
      margin-bottom: 8px;
    }

    .insight-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .insight-list li {
      color: var(--muted);
      line-height: 1.6;
      padding-left: 12px;
      border-left: 3px solid var(--line-strong);
    }

    .semester-map {
      display: grid;
      gap: 12px;
    }

    .semester-plan {
      display: grid;
      grid-template-columns: minmax(260px, 0.34fr) minmax(620px, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .unit-catalog,
    .week-plan-board {
      min-height: 520px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 28px rgba(29, 39, 35, 0.04);
    }

    .plan-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      font-weight: 900;
    }

    .unit-list {
      display: grid;
      gap: 14px;
    }

    .unit-group {
      display: grid;
      gap: 8px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .unit-group:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .unit-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 850;
    }

    .unit-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .unit-color-mark {
      width: 7px;
      height: 18px;
      border-radius: 999px;
      background: var(--green);
      flex: 0 0 auto;
    }
    .unit-color-mark.blue { background: var(--blue); }
    .unit-color-mark.amber { background: var(--amber); }
    .unit-color-mark.red { background: var(--red); }

    .unit-hours {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .lesson-list {
      display: grid;
      gap: 7px;
      padding-left: 16px;
      border-left: 1px solid var(--line);
      margin-left: 3px;
    }

    .lesson-line {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .lesson-code {
      color: var(--green);
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .week-plan-list {
      display: grid;
      gap: 7px;
    }

    .week-row {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr);
      gap: 10px;
      align-items: stretch;
    }

    .week-label {
      min-height: 46px;
      display: grid;
      place-items: center;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      text-align: center;
    }

    .week-name {
      font-weight: 900;
    }

    .week-date {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .week-slots {
      min-height: 46px;
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 8px;
      align-items: center;
      padding: 6px 10px;
      border: 1px solid #e2e8e5;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.74);
    }

    .plan-lesson {
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid #b9d9cf;
      background: linear-gradient(135deg, #edf8f5, #ffffff);
      color: #244c42;
      font-weight: 750;
    }

    .plan-lesson .lesson-code {
      color: var(--green);
      min-width: 34px;
    }

    .plan-lesson.blue {
      border-color: #b7cbed;
      background: linear-gradient(135deg, #eef5ff, #ffffff);
    }

    .plan-lesson.blue .lesson-code {
      color: #2f63bd;
    }

    .plan-lesson.amber {
      border-color: #efcaa5;
      background: linear-gradient(135deg, #fff6ed, #ffffff);
    }

    .plan-lesson.amber .lesson-code {
      color: #c06318;
    }

    .plan-lesson.red {
      border-color: #e5b7b1;
      background: linear-gradient(135deg, #fff1ef, #ffffff);
    }

    .plan-lesson.red .lesson-code {
      color: var(--red);
    }

    .plan-lesson.buffer {
      color: var(--muted);
      border-color: #dce3df;
      background: #fbfcfc;
      font-weight: 650;
    }

    .map-lane {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .lane-label {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .lane-title {
      font-weight: 850;
    }

    .lane-note {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 12px;
    }

    .lane-track {
      min-height: 118px;
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.84);
    }

    .map-block {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 112px;
    }

    .map-empty {
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: #fbfcfc;
      color: var(--muted);
      display: grid;
      place-items: center;
      min-height: 112px;
      text-align: center;
      padding: 10px;
      line-height: 1.5;
    }

    .tool-rail {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 7px;
      min-width: 0;
      padding: 0;
      background: transparent;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
    }

    .tool-btn {
      position: relative;
      width: 38px;
      height: 38px;
      min-height: 38px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--green);
      display: inline-grid;
      place-items: center;
      padding: 0;
    }

    .tool-btn:hover,
    .tool-btn.active {
      border-color: var(--green);
      background: var(--green-soft);
      color: var(--green);
    }

    .tool-btn::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      top: calc(100% + 8px);
      transform: translateX(-50%);
      display: none;
      min-width: max-content;
      max-width: 180px;
      padding: 7px 9px;
      border-radius: 7px;
      background: var(--ink);
      color: #fff;
      font-size: 12px;
      box-shadow: var(--shadow);
      z-index: 8;
    }

    .tool-btn:hover::after {
      display: block;
    }

    .tool-label {
      display: none;
    }

    .tool-btn:hover .tool-label,
    .tool-btn.active .tool-label {
      color: var(--green);
    }

    .tool-separator {
      width: 1px;
      height: 24px;
      background: var(--line);
      margin: 0 2px;
      flex: 0 0 auto;
    }

    .inspector {
      position: absolute;
      top: var(--inspector-top, 18px);
      left: var(--inspector-left, auto);
      right: auto;
      width: min(340px, calc(100% - 36px));
      max-height: calc(100% - 36px);
      overflow: auto;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      z-index: 5;
    }

    .inspector.hidden {
      display: none;
    }

    .inspector-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .inspector-kicker {
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .inspector-title {
      font-size: 16px;
      font-weight: 850;
      line-height: 1.35;
    }

    .icon-close {
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--muted);
    }

    .inspector-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .field-grid {
      display: grid;
      gap: 8px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 90px minmax(0, 1fr);
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
    }

    .field-row:last-child {
      border-bottom: 0;
    }

    .field-label {
      color: var(--muted);
      font-size: 12px;
    }

    .field-value {
      line-height: 1.55;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .inspector-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pending-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--amber-soft);
      padding: 10px;
      color: #5c3b17;
      line-height: 1.6;
    }

    .status-strip {
      height: 42px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr) 64px;
      align-items: center;
      border-top: 1px solid var(--line);
      background: #ffffff;
      color: var(--muted);
      font-size: 12px;
    }

    body[data-active-view="prepNotebook"] .workspace {
      height: calc(100vh - 72px - 54px - 78px);
    }

    body[data-active-view="prepNotebook"] .status-strip {
      display: none;
    }

    .status-cell {
      min-width: 0;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
      white-space: nowrap;
    }

    .status-main {
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .status-text {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .flow-steps {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .flow-step {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #9aa5a1;
      white-space: nowrap;
    }

    .flow-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #cbd5d1;
    }

    .flow-step.current {
      color: var(--green);
      font-weight: 800;
    }

    .flow-step.current .flow-dot {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(47, 118, 104, 0.12);
    }

    .flow-sep {
      color: #c4ceca;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 56px;
      transform: translateX(-50%) translateY(12px);
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 10;
      max-width: min(680px, calc(100vw - 32px));
      line-height: 1.55;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .xiaobei-chat-entry {
      height: 78px;
      display: grid;
      grid-template-columns: 226px minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      border-top: 1px solid var(--line);
      background: #ffffff;
    }

    .chat-agent {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .chat-avatar {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 12px;
      background: var(--green);
      color: #fff;
      font-weight: 900;
    }

    .chat-agent-name {
      font-weight: 850;
      line-height: 1.25;
    }

    .chat-agent-role {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-input-shell {
      min-width: 0;
      min-height: 50px;
      display: grid;
      grid-template-columns: 38px 38px minmax(0, 1fr) 38px;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      background: #fbfdfc;
    }

    .chat-tool,
    .chat-send {
      border: 1px solid var(--line);
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #fff;
      color: var(--green);
      font-weight: 850;
    }

    .chat-tool:hover {
      background: var(--green-soft);
      border-color: #b9d9cf;
    }

    .chat-send {
      width: 34px;
      min-width: 34px;
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .chat-input {
      width: 100%;
      min-width: 0;
      height: 38px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      padding: 0 4px;
    }

    .chat-upload-input {
      display: none;
    }

    @media (max-width: 1180px) {
      .topbar {
        grid-template-columns: minmax(180px, 0.8fr) minmax(300px, 1.2fr) minmax(220px, 0.8fr);
      }

      .space-nav {
        gap: 7px;
      }

      .space-btn {
        width: 38px;
        height: 38px;
      }

      .view-tabs {
        width: max-content;
      }

      .week-board,
      .lane-track {
        grid-template-columns: repeat(3, minmax(150px, 1fr));
      }
    }

    @media (max-width: 1080px) and (min-width: 901px) {
      .status-strip {
        grid-template-columns: 220px minmax(0, 1fr) 64px;
      }
    }

    @media (max-width: 900px) {
      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
      }

      body {
        overflow-y: auto;
      }

      .topbar {
        height: auto;
        min-height: 58px;
        grid-template-columns: 1fr;
        align-items: flex-start;
        padding: 12px;
        width: 100%;
        max-width: 100vw;
      }

      .space-nav,
      .nav-right {
        width: 100%;
        max-width: calc(100vw - 24px);
        flex-wrap: wrap;
        justify-content: flex-start;
      }

      .nav-right {
        display: grid;
        grid-template-columns: 38px 38px;
      }

      .search-box {
        max-width: none;
        width: calc(100vw - 24px);
        grid-column: 1 / -1;
      }

      .context-bar {
        align-items: flex-start;
        grid-template-columns: 1fr;
        padding: 10px 12px;
      }

      .context-title {
        width: auto;
        justify-self: center;
        order: -1;
        font-size: 24px;
      }

      .context-meta {
        width: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 8px;
      }

      .context-chip {
        min-width: 0;
        justify-content: center;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .view-tabs {
        grid-template-columns: repeat(4, 42px);
        width: max-content;
        justify-self: center;
      }

      .ai-tool-strip {
        grid-template-columns: auto minmax(0, 1fr);
        padding: 8px 12px;
      }

      .workspace {
        height: auto;
        min-height: 720px;
        grid-template-columns: 1fr;
      }

      .prep-render-canvas {
        min-height: 760px;
      }

      .render-layer {
        min-width: 0;
      }

      .metrics-row,
      .semester-plan,
      .map-lane,
      .week-board,
      .lane-track {
        grid-template-columns: 1fr;
      }

      .unit-catalog,
      .week-plan-board {
        min-height: 0;
      }

      .week-row {
        grid-template-columns: 1fr;
      }

      .week-slots {
        grid-template-columns: 1fr;
      }

      .metric.week-metric .metric-value {
        min-width: 68px;
        min-height: 48px;
        font-size: 22px;
      }

      .cps-control-row {
        grid-template-columns: 1fr;
      }

      .cps-control-cluster {
        align-items: flex-start;
      }

      .cps-legend-row {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 2px;
      }

      .cps-main-grid {
        grid-template-columns: minmax(180px, 0.35fr) minmax(180vw, 1.6fr) minmax(220px, 0.45fr);
        align-items: stretch;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .cps-board {
        min-width: 180vw;
      }

      .wc-control-row {
        align-items: flex-start;
      }

      .wc-main-grid {
        grid-template-columns: minmax(240vw, 1fr) minmax(220px, 0.55fr);
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .wc-calendar-board {
        min-width: 240vw;
      }

      .wc-header-row,
      .wc-period-row {
        min-width: 240vw;
      }

      .nb-scene {
        grid-template-columns: 1fr;
      }

      .nb-binder {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .nb-scene::before,
      .nb-scene::after,
      .nb-panel::after,
      .nb-gutter {
        display: none;
      }

      .nb-panel,
      .nb-workspace,
      .nb-drawer {
        min-height: 0;
      }

      .nb-hero {
        grid-template-columns: 1fr;
      }

      .nb-hero-actions {
        justify-content: flex-start;
      }

      .nb-status-grid,
      .nb-work-sections,
      .nb-field-grid,
      .nb-intent-grid,
      .nb-flow {
        grid-template-columns: 1fr;
      }

      .nb-step-main {
        grid-template-columns: 1fr;
      }

      .nb-doc-section-head,
      .nb-state-bar {
        align-items: flex-start;
      }

      .inspector {
        position: relative;
        top: auto;
        right: auto;
        width: 100%;
        margin-top: 14px;
        max-height: none;
      }

      .status-strip {
        height: auto;
        grid-template-columns: 1fr;

    function icon(name, size = "") {
      const body = icons[name] || icons.arrow;
      return `<svg class="icon ${size}" viewBox="0 0 24 24" aria-hidden="true">${body}</svg>`;
    }

    function sr(text) {
      return `<span class="sr-only">${html(text)}</span>`;
    }

    function iconButtonLabel(text, iconName, iconOnly = true) {
      return `${icon(iconName)}${iconOnly ? sr(text) : `<span>${html(text)}</span>`}`;
    }

    function iconForAction(action) {
      const text = String(action || "");
      if (/送入|预览|大屏|课堂/.test(text)) return "monitor";
      if (/完善|补齐|检查|确认|完成/.test(text)) return "check";
      if (/重排|重组|调整|更新/.test(text)) return "refresh";
      if (/拆|压缩/.test(text)) return "scissors";
      if (/评价|量规|互评|小评/.test(text)) return "star";
      if (/资料|材料|查看|检索|学习单/.test(text)) return "file";
      if (/生成|预置|方案|小美/.test(text)) return "wand";
      return "arrow";
    }

    function iconForView(viewId) {
      if (viewId === "weekCalendar") return "calendar";
      if (viewId === "prepNotebook") return "worksheet";
      if (viewId === "classProgressSchedule") return "layers";
      if (viewId === "flexibleSemesterMap") return "map";
      return "prep";
    }

      const map = {
        textbook: "knowledge",

        reschedule: "refresh",
        flow: "flow",
        worksheet: "worksheet",
        search: "search",

        xiaoping: "star",
        xiaoguan: "archive"

    function applyInitialViewFromHash() {
      const viewId = decodeURIComponent((window.location.hash || "").replace(/^#/, ""));
      if (!viewId) return;
      const prepView = model.views.find((view) => view.id === "prepNotebook");
      if (viewId === "prepNotebookEdit" && prepView) {
        model.active_view = "prepNotebook";
        prepView.prep_notebook_mode = "edit";
        prepView.expanded_intent_steps = ["explore"];
        prepView.active_edit_target = { section_id: "teaching_process", step_id: "explore", label: "教学过程 · 探究环节" };
      } else if (viewId === "prepNotebook1013F" && prepView) {
        model.active_view = "prepNotebook";
        prepView.prep_notebook_mode = "view";
        prepView.expanded_intent_steps = [];
        model.initial_scroll_target = "nb-1013f-binding";
      } else if (viewId === "prepNotebook1013FEdit" && prepView) {
        model.active_view = "prepNotebook";
        prepView.prep_notebook_mode = "edit";
        prepView.expanded_intent_steps = ["explore"];
        prepView.active_edit_target = { section_id: "teaching_process", step_id: "explore", label: "教学过程 · 色卡分类探究" };
        model.initial_scroll_target = "nb-1013f-patch-card";
      } else if (viewId === "prepNotebookIntent" && prepView) {
        model.active_view = "prepNotebook";
        prepView.prep_notebook_mode = "view";
        prepView.expanded_intent_steps = ["explore"];
        prepView.active_edit_target = { section_id: "teaching_process", step_id: "explore", label: "教学过程 · 探究环节" };

      } else if (viewId === "prepNotebookReasoning" && prepView) {
        model.active_view = "prepNotebook";
        const trace = prepView.reasoning_trace || {};
        trace.status = "done";
        trace.active_index = (trace.stages || []).length - 1;
        trace.teacher_input = "学生对冷暖色不太理解，要设计得更直观一点。";
        trace.result = "我先整理成两处候选：探究环节加色卡分组，学习单加感受记录格。等你确认。";
        prepView.reasoning_trace = trace;
        applyPrepReasoningCandidate(prepView);
      } else {
        if (!model.views.some((view) => view.id === viewId)) return;
        model.active_view = viewId;
        if (viewId === "prepNotebook" && prepView) {
          prepView.prep_notebook_mode = "view";
          prepView.expanded_intent_steps = [];

      }

      const firstWcNode = Object.values(view.slots || {}).flat()[0]?.id || "";
      model.selected_node_id = view.active_node || firstWcNode || model.selected_node_id;
    }

    function getPlanLessonDetail(nodeId) {
      const planView = model.views.find((view) => view.id === "flexibleSemesterMap");
      if (!planView || !String(nodeId).startsWith("plan-")) return null;
      const lessonId = String(nodeId).replace(/^plan-/, "");
      const week = (planView.plan_weeks || []).find((item) => item.lessons.some(([code]) => code === lessonId));
      const lesson = week?.lessons.find(([code]) => code === lessonId);
      if (!lesson) return null;
      const [code, title, tone] = lesson;
      return {
        type: "学期规划课时",
        title: code.startsWith("buffer") || code === "final-show" ? title : `${code} ${title}`,
        fields: [
          ["周次", week.week],
          ["日期", week.date],
          ["单元类型", tone === "blue" ? "海洋/成长类单元" : tone === "amber" ? "青绿中国色/创艺节单元" : tone === "red" ? "红色主题单元" : tone === "buffer" ? "机动与评价" : "教材学习单元"],
          ["正式边界", "仅生成预演，教师确认前不应用"]
        ],
        actions: ["调整周次", "生成课包", "查看影响"]
      };
    }

    function getNodeDetail(nodeId) {
      const nbElement = Array.from(document.querySelectorAll("[data-nb-detail]")).find((item) => item.dataset.node === nodeId);
      if (nbElement) {
        const detail = JSON.parse(nbElement.dataset.nbDetail);
        return {
          type: detail.type,
          title: `${detail.code} ${detail.title}`,
          fields: [
            ["所在目录", detail.group],
            ["当前状态", detail.status],
            ["空间边界", "备课本过程态，不等同于资料室或档案室"],
            ["正式边界", "仅生成预演，教师确认前不应用"]
          ],
          actions: ["打开工作页", "补齐课前包", "查看资料", "写课后记录"]
        };
      }
      const prepFieldElement = Array.from(document.querySelectorAll("[data-prep-field]")).find((item) => item.dataset.node === nodeId);
      if (prepFieldElement) {
        const detail = JSON.parse(prepFieldElement.dataset.prepField);
        return {
          type: detail.type,
          title: detail.title,
          fields: [
            ["当前状态", detail.state],
            ["字段内容", detail.body],
            ["依据", (detail.sources || []).join("、")],
            ["候选", (detail.candidates || []).join("；") || "暂无"],
            ["正式边界", "教师确认前不应用"]
          ],
          actions: ["确认候选", "继续打磨", "引用资料", "标记待沉淀"]
        };
      }
      const wcElement = Array.from(document.querySelectorAll("[data-wc-detail]")).find((item) => item.dataset.node === nodeId);
      if (wcElement) {
        const detail = JSON.parse(wcElement.dataset.wcDetail);
        return {
          type: "课前包详情",
          title: detail.code ? `${detail.classLabel} ${detail.code} ${detail.title}` : detail.title,
          fields: [
            ["时间", `${detail.day} ${detail.date} ${detail.period}`],
            ["班级", detail.classLabel || "全校/活动"],
            ["类型", wcCardTypeLabel(detail.type)],
            ["课前包状态", detail.packageStatus],
            ["已准备", detail.type === "warning" ? "课时设计、资源参考" : "课时设计、学习单、资源参考"],
            ["待处理", detail.type === "warning" ? "学习单/评价量规待确认" : "无正式写入，仅预演"],
            ["上次轻记录", detail.classLabel ? "学生对材料组合和色彩关系需要更多示范。" : "事件占用将影响后续课时落点。"]
          ],
          actions: ["打开课时设计", "确认学习单", "生成量规", "顺手记一笔"]
        };
      }
      const cpsElement = Array.from(document.querySelectorAll("[data-cps-detail]")).find((item) => item.dataset.node === nodeId);
      if (cpsElement) {
        const detail = JSON.parse(cpsElement.dataset.cpsDetail);
        return {
          type: "班级课时实例",
          title: detail.code ? `${detail.code} ${detail.title}` : detail.title,
          fields: [
            ["班级", detail.classLabel],
            ["周次", `${detail.week} ${detail.date}`],
            ["槽位", detail.slot],
            ["类型", cpsCardTypeLabel(detail.type)],
            ["联动", detail.type === "lesson" || detail.type === "future" ? "课包、学习单、评价量规、材料" : "小教调整候选、影响范围"],
            ["正式边界", "仅生成预演，教师确认前不应用"]
          ],
          actions: detail.type === "lesson" || detail.type === "future" ? ["查看课包", "推送下节准备", "生成量规"] : ["查看影响", "采用调整", "暂不处理"]
        };
      }
      const planDetail = getPlanLessonDetail(nodeId);
      if (planDetail) return planDetail;
      if (model.node_details[nodeId]) return model.node_details[nodeId];
      const allNodes = model.views.flatMap((view) => [
        ...(view.nodes || []),
        ...(view.weeks || []),
        ...((view.lanes || []).flatMap((lane) => lane.blocks || []))
      ]);
      const node = allNodes.find((item) => item.id === nodeId);
      if (!node) return null;
      return {
        type: "画布节点",
        title: node.title || node.label || node.id,
        fields: Object.entries(node)
          .filter(([key]) => !["id", "actions"].includes(key))
          .map(([key, value]) => [key, Array.isArray(value) ? value.join("、") : value]),
        actions: node.actions || ["生成预演"]
      };
    }
